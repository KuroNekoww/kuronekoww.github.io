<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>山本小面包🍞的导航页</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js" defer></script>

    <style>
        :root {
            color-scheme: light dark;
            --hitokoto-fade-duration: 220ms;
            --transition-normal: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --transition-bounce: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @media (prefers-color-scheme: light) {
            :root {
                --liquid-bg: rgba(0, 0, 0, 0.05);
                --liquid-blur: blur(25px) saturate(200%);
                --liquid-border: rgba(0, 0, 0, 0.1);
                --text-color: #1d1d1f;
                --accent-blue: #007aff;
                --overlay-color: rgba(255, 255, 255, 0.35);
                --page-bg: #f5f5f7;
            }
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --liquid-bg: rgba(255, 255, 255, 0.06);
                --liquid-blur: blur(25px) saturate(200%);
                --liquid-border: rgba(255, 255, 255, 0.12);
                --text-color: #ffffff;
                --accent-blue: #4ea1ff;
                --overlay-color: rgba(0, 0, 0, 0.45);
                --page-bg: #000000;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
            color: var(--text-color);
            background-color: var(--page-bg);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 背景层：彻底锁定 */
        #bg-layer {
            position: fixed;
            top: 0; left: 0; 
            width: 100vw;
            /* 初始高度设为足够大，等待JS锁定具体像素值 */
            height: 120vh; 
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat;
            opacity: 0; 
            transition: opacity 0.8s ease-in-out;
            z-index: -2;
            transform: translate3d(0,0,0); /* 开启硬件加速 */
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--overlay-color); z-index: -1; pointer-events: none;
        }

        .container {
            max-width: 1100px; margin: 0 auto; padding: 40px 20px;
            min-height: 100vh; position: relative; z-index: 1;
        }

        header { text-align: center; margin-bottom: 40px; }
        .main-title { font-size: 2.5rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 18px; }

        /* 全局去阴影 */
        .search-wrapper, .hitokoto-capsule, .nav-card, .footer-glass {
            background: var(--liquid-bg); 
            backdrop-filter: var(--liquid-blur); 
            -webkit-backdrop-filter: var(--liquid-blur);
            border: 1px solid var(--liquid-border);
            box-shadow: none !important; /* 强制去除阴影 */
        }

        .search-wrapper {
            display: flex; align-items: center; border-radius: 50px; 
            padding: 16px 30px; width: 100%; max-width: 680px; margin: 0 auto 50px auto;
            transition: var(--transition-normal);
        }
        .search-wrapper:focus-within {
            transform: scale(1.02);
            border-color: var(--accent-blue);
            background: var(--liquid-bg);
        }
        .search-wrapper img { width: 22px; height: 22px; margin-right: 14px; }
        .search-wrapper input { 
            flex: 1; background: transparent; border: none; 
            color: var(--text-color); outline: none; font-size: 1.15rem; font-weight: 500; 
        }

        .hitokoto-capsule {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 10px 24px; border-radius: 40px; cursor: pointer; 
            max-width: 85vw; transition: var(--transition-bounce);
        }
        .hitokoto-capsule:active { transform: scale(0.92); }

        #hitokoto-text {
            font-size: 0.92rem; font-weight: 500; line-height: 1.5;
            transition: opacity var(--hitokoto-fade-duration) ease, transform var(--hitokoto-fade-duration) ease;
        }
        .fade-out { opacity: 0; transform: translateY(-5px); }
        .fade-in { opacity: 1; transform: translateY(0); }

        .category-title {
            font-size: 1.1rem; margin: 35px 0 20px 0; font-weight: 700; 
            border-left: 4px solid var(--accent-blue); padding-left: 14px;
        }

        .nav-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .nav-card {
            border-radius: 24px; padding: 24px; text-decoration: none; 
            color: var(--text-color); opacity: 0; transform: translateY(20px);
            transition: background 0.3s, border-color 0.3s, transform 0.4s var(--transition-bounce);
        }
        .nav-card.show { opacity: 1; transform: translateY(0); }
        .card-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }
        .card-desc { font-size: 0.88rem; opacity: 0.6; line-height: 1.5; }

        @media (hover: hover) {
            .nav-card:hover { transform: translateY(-5px); border-color: var(--accent-blue); }
            .footer-link:hover { color: var(--accent-blue); opacity: 1; }
        }

        body.mobile-mode .main-title { font-size: 1.5rem; }
        body.mobile-mode .nav-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
        body.mobile-mode .nav-card { padding: 16px; border-radius: 18px; }
        body.mobile-mode .card-desc { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        footer { margin: 60px 0 30px 0; text-align: center; }
        .footer-glass { display: inline-flex; gap: 20px; padding: 14px 35px; border-radius: 50px; }
        .footer-link { color: var(--text-color); text-decoration: none; font-size: 0.85rem; font-weight: 600; opacity: 0.7; }
    </style>
</head>
<body>
    <div id="bg-layer"></div>
    <div class="overlay"></div>
    <div class="container">
        <header>
            <h1 class="main-title">山本小面包🍞的导航页</h1>
            <div class="hitokoto-capsule" id="hitokoto-btn">
                <span id="hitokoto-text">正在捕捉诗句...</span>
            </div>
        </header>
        <main>
            <div class="search-wrapper">
                <img src="https://picui.ogmua.cn/s1/2026/03/30/69c94d3fbf8c8.webp" alt="Bing">
                <input type="text" id="search-input" placeholder="在 Bing 上搜索" autocomplete="off">
            </div>
            <div id="nav-container"></div>
        </main>
        <footer>
            <div class="footer-glass">
                <a id="download-bg" class="footer-link" target="_blank">📥 下载壁纸</a>
                <span id="refresh-bg" class="footer-link">🔄 切换背景</span>
            </div>
        </footer>
    </div>

    <script>
        const dom = {
            body: document.body,
            bgLayer: document.getElementById('bg-layer'),
            downloadBg: document.getElementById('download-bg'),
            refreshBg: document.getElementById('refresh-bg'),
            hitokotoBtn: document.getElementById('hitokoto-btn'),
            hitokotoText: document.getElementById('hitokoto-text'),
            searchInput: document.getElementById('search-input'),
            navContainer: document.getElementById('nav-container')
        };

        // 1. 修复键盘弹出背景放大问题的逻辑核心
        let lastWidth = window.innerWidth;
        const fixBgHeight = () => {
            const currentWidth = window.innerWidth;
            // 只有宽度改变（横竖屏切换）时才更新背景高度，忽略键盘弹起引起的高度变化
            if (currentWidth !== lastWidth || !dom.bgLayer.style.height) {
                const screenHeight = window.screen.height || window.innerHeight;
                dom.bgLayer.style.height = `${screenHeight + 100}px`; // 额外多出100px确保不露底
                lastWidth = currentWidth;
            }
        };

        // 设备初始化
        const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        if (isMobile) dom.body.classList.add('mobile-mode');

        fixBgHeight();
        window.addEventListener('resize', fixBgHeight);

        // 2. 背景加载逻辑
        const loadBg = async () => {
            const api = isMobile ? 'https://api.yppp.net/pe.php' : 'https://api.yppp.net/pc.php';
            try {
                dom.bgLayer.style.opacity = 0;
                const res = await fetch(api);
                const url = res.url;
                const img = new Image();
                img.src = url;
                img.onload = () => {
                    dom.bgLayer.style.backgroundImage = `url('${url}')`;
                    dom.bgLayer.style.opacity = 1;
                    dom.downloadBg.href = url;
                };
            } catch (e) { console.error("BG Error"); }
        };
        loadBg();
        dom.refreshBg.onclick = loadBg;

        // 3. 一言交互逻辑 (带点击弹性反馈延迟)
        let isFetching = false;
        const fetchHitokoto = async () => {
            if (isFetching) return;
            isFetching = true;
            
            dom.hitokotoText.classList.add('fade-out');
            
            try {
                // 确保点击动画至少播放一段时间
                const [res] = await Promise.all([
                    fetch('https://v1.hitokoto.cn?max_length=25'),
                    new Promise(r => setTimeout(r, 400))
                ]);
                const data = await res.json();
                dom.hitokotoText.innerText = `${data.hitokoto} —— 「${data.from}」`;
            } catch (e) {
                dom.hitokotoText.innerText = "纵使疾风起，人生不言弃。";
            } finally {
                dom.hitokotoText.classList.remove('fade-out');
                dom.hitokotoText.classList.add('fade-in');
                setTimeout(() => {
                    dom.hitokotoText.classList.remove('fade-in');
                    isFetching = false;
                }, 300);
            }
        };
        dom.hitokotoBtn.onclick = fetchHitokoto;
        fetchHitokoto();

        // 4. 搜索功能
        dom.searchInput.onkeypress = (e) => {
            if (e.key === 'Enter' && e.target.value.trim()) {
                window.open(`https://www.bing.com/search?q=${encodeURIComponent(e.target.value)}`, '_blank');
                e.target.blur();
            }
        };

        // 5. 导航卡片渲染
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(en => { if (en.isIntersecting) en.target.classList.add('show'); });
        }, { threshold: 0.1 });

        const renderNav = async () => {
            try {
                const res = await fetch('./config.yml');
                const yamlText = await res.text();
                const config = jsyaml.load(yamlText);

                config.categories.forEach(cat => {
                    const h2 = document.createElement('h2');
                    h2.className = 'category-title';
                    h2.innerText = cat.name;
                    dom.navContainer.appendChild(h2);

                    const grid = document.createElement('div');
                    grid.className = 'nav-grid';
                    cat.links.forEach(link => {
                        const a = document.createElement('a');
                        a.className = 'nav-card';
                        a.href = link.url; a.target = '_blank';
                        a.innerHTML = `<div class="card-title">${link.title}</div><div class="card-desc">${link.desc}</div>`;
                        grid.appendChild(a);
                        observer.observe(a);
                    });
                    dom.navContainer.appendChild(grid);
                });
            } catch (e) { console.error("YAML Error"); }
        };
        renderNav();
    </script>
</body>
</html>
