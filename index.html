<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>山本小面包🍞的导航页</title>
    <link rel="shortcut icon" href="./ico.ico" type="image/x-icon">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.7);
            --glass-deep: rgba(255, 255, 255, 0.9);
            --text: #1e293b;
            --accent: #0078d4;
            --download: #ff6b6b;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --glass: rgba(15, 23, 42, 0.75);
                --glass-deep: rgba(30, 41, 59, 0.95);
                --text: #f1f5f9;
            }
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            margin: 0; font-family: 'PingFang SC', system-ui, sans-serif;
            color: var(--text); min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            padding: 40px 20px 60px;
        }

        /* 背景层：合并冗余，使用 inset 替代多行坐标 */
        .fixed-bg {
            position: fixed; inset: 0; z-index: -2;
            background: #1a1a1a no-repeat center/cover;
            opacity: 0; transition: opacity 1s ease;
            will-change: opacity;
        }

        /* 遮罩层：合并到单独类，减少 body::before 的样式冲突 */
        .overlay {
            position: fixed; inset: 0; z-index: -1;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: brightness(0.9);
            -webkit-backdrop-filter: brightness(0.9);
        }

        .container { width: 100%; max-width: 900px; z-index: 1; }

        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { 
            font-size: clamp(2rem, 5vw, 2.8rem); margin: 0; color: #fff; 
            text-shadow: 0 4px 15px rgba(0,0,0,0.5); letter-spacing: -1px;
        }

        /* 公用玻璃质感类 */
        .glass-effect {
            background: var(--glass);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        #hitokoto { 
            display: inline-block; margin-top: 18px; padding: 10px 24px;
            border-radius: 30px; font-size: 0.95rem; cursor: pointer;
            transition: all 0.2s ease;
        }
        #hitokoto:active { transform: scale(0.94); opacity: 0.8; }

        .search-area { margin-bottom: 50px; display: flex; justify-content: center; }
        .search-box {
            display: flex; align-items: center; width: 100%; max-width: 580px; 
            border-radius: 50px; padding: 6px 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .search-box:focus-within { transform: translateY(-3px); border-color: var(--accent); background: var(--glass-deep); }
        .search-box input { flex: 1; border: none; background: transparent; color: var(--text); font-size: 1.1rem; padding: 10px 0; }

        /* 分类与标题 */
        .category { margin-bottom: 45px; opacity: 0; animation: fadeInUp 0.8s ease forwards; }
        .category-title {
            display: flex; align-items: center; font-size: 1.25rem; font-weight: bold; 
            margin-bottom: 20px; color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,0.5);
            padding-left: 14px; border-left: 4px solid var(--accent);
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }

        .card {
            padding: 20px; display: flex; align-items: center; gap: 16px; 
            border-radius: 20px; text-decoration: none; color: inherit;
            transition: all 0.3s ease; position: relative; overflow: hidden;
        }

        @media (hover: hover) {
            .card:hover { transform: translateY(-6px); background: var(--glass-deep); border-color: var(--accent); }
            .card::after {
                content: ""; position: absolute; inset: 0; left: -100%;
                background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
                transition: 0.5s;
            }
            .card:hover::after { left: 100%; }
            .card:hover .icon { transform: rotate(12deg) scale(1.1); }
        }
        .card:active { transform: scale(0.96); }

        .icon { font-size: 2.2rem; transition: transform 0.3s ease; }

        .footer-download {
            text-align: center; margin-top: auto; padding: 15px 30px;
            border-radius: 40px; font-size: 0.9rem;
        }
        .footer-download a { color: var(--download); text-decoration: none; font-weight: 800; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="fixed-bg" id="bg-layer"></div>
<div class="overlay"></div>

<div class="container">
    <div class="header">
        <h1 id="page-title">山本小面包🍞的导航站</h1>
        <div id="hitokoto" class="glass-effect">正在连接异世界...</div>
    </div>

    <div class="search-area">
        <form class="search-box glass-effect" action="https://www.bing.com/search" method="get" target="_blank">
            <img src="https://picui.ogmua.cn/s1/2026/03/30/69c94d3fbf8c8.webp" alt="B" style="width:24px; margin-right:12px;">
            <input type="text" name="q" placeholder="在 Bing 中搜索..." autocomplete="off">
        </form>
    </div>

    <div id="nav-container"></div>

    <div class="footer-download glass-effect">
        喜欢背景图吗? <a id="download-link" href="#" target="_blank">点击下载</a>
    </div>
</div>

<script>
    const isMobile = /Android|webOS|iPhone|iPad|iPod/i.test(navigator.userAgent);
    const bgUrl = isMobile ? 'https://api.yppp.net/pe.php' : 'https://api.yppp.net/pc.php';

    // 优化 1: 合并请求逻辑，利用一次 fetch 同时解决背景和下载链接
    async function initPage() {
        const bgLayer = document.getElementById('bg-layer');
        const downloadLink = document.getElementById('download-link');

        try {
            const res = await fetch(bgUrl);
            const finalUrl = res.ok ? res.url : bgUrl;
            
            const img = new Image();
            img.src = finalUrl;
            img.onload = () => {
                bgLayer.style.backgroundImage = `url('${finalUrl}')`;
                bgLayer.style.opacity = '1';
                downloadLink.href = finalUrl;
            };
        } catch (e) {
            bgLayer.style.backgroundImage = `url('${bgUrl}')`;
            bgLayer.style.opacity = '1';
        }
    }

    // 优化 2: 简化的“一言”获取，移除冗余样式操作
    async function getHitokoto() {
        const hElem = document.getElementById('hitokoto');
        try {
            const res = await fetch('https://v1.hitokoto.cn?c=a&max_length=25');
            const data = await res.json();
            hElem.innerText = `${data.hitokoto} —— 「${data.from}」`;
        } catch (e) {
            hElem.innerText = "跨越星辰，只为与你相遇。";
        }
    }

    // 优化 3: 纯净的配置加载逻辑
    async function loadNav() {
        const container = document.getElementById('nav-container');
        try {
            const response = await fetch('./config.yml');
            const yamlText = await response.text();
            const config = jsyaml.load(yamlText);
            
            if (config.header) document.getElementById('page-title').innerText = config.header.title;

            container.innerHTML = config.categories.map((cat, idx) => `
                <div class="category" style="animation-delay: ${idx * 0.1}s">
                    <div class="category-title">${cat.name}</div>
                    <div class="grid">${cat.links.map(link => `
                        <a href="${link.url}" class="card glass-effect" target="_blank">
                            <div class="icon">${link.icon || '🔗'}</div>
                            <div class="info">
                                <h3 style="margin:0; font-size:1.05rem;">${link.name}</h3>
                                <p style="margin:5px 0 0; font-size:0.85rem; opacity:0.8;">${link.desc || ''}</p>
                            </div>
                        </a>
                    `).join('')}</div>
                </div>
            `).join('');
        } catch (e) {
            container.innerHTML = '<p style="text-align:center;color:#fff;">配置加载失败</p>';
        }
    }

    // 统一初始化
    window.addEventListener('DOMContentLoaded', () => {
        initPage();
        getHitokoto();
        loadNav();
        document.getElementById('hitokoto').onclick = getHitokoto;
    });
</script>
</body>
</html>
