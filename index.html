<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>山本小面包🍞的导航页</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-main: #1e293b;
            --accent-color: #0078d4;
            --download-link: #ff6b6b;
            --card-hover: rgba(255, 255, 255, 0.9);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --glass-bg: rgba(15, 23, 42, 0.65);
                --glass-border: rgba(255, 255, 255, 0.15);
                --text-main: #f1f5f9;
                --card-hover: rgba(30, 41, 59, 0.95);
            }
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        /* 背景层：预加载+防拉伸 */
        .fixed-bg {
            position: fixed; inset: 0; z-index: -2;
            background-color: #1a1a1a;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            opacity: 0; 
            transition: opacity 0.8s ease-in-out;
            will-change: transform, opacity;
        }

        .overlay {
            position: fixed; inset: 0; z-index: -1;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: brightness(0.9) blur(1px);
            -webkit-backdrop-filter: brightness(0.9) blur(1px);
        }

        body {
            margin: 0; font-family: 'PingFang SC', system-ui, sans-serif;
            color: var(--text-main); min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            padding: 40px 20px 60px 20px; overflow-x: hidden;
        }

        .container { width: 100%; max-width: 900px; z-index: 1; }

        /* 标题入场动画 */
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { 
            font-size: 2.4rem; margin: 0; color: #fff; 
            text-shadow: 0 4px 15px rgba(0,0,0,0.5);
            animation: slideDown 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        #hitokoto { 
            display: inline-block; margin-top: 18px; padding: 12px 24px;
            background: var(--glass-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); border-radius: 30px;
            cursor: pointer; font-size: 0.95rem; box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            transition: transform 0.15s ease;
        }
        #hitokoto:active { transform: scale(0.92); opacity: 0.8; }

        /* 搜索框 */
        .search-area { margin: 40px 0 60px 0; display: flex; justify-content: center; }
        .bing-search-container {
            display: flex; align-items: center; width: 100%; max-width: 500px;
            background: var(--glass-bg); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-radius: 50px; padding: 4px 22px; border: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); transition: all 0.3s ease;
        }
        .bing-search-container:focus-within { transform: translateY(-4px); border-color: var(--accent-color); background: var(--card-hover); }
        .bing-icon-wrapper { width: 24px; height: 24px; margin-right: 14px; flex-shrink: 0; }
        .bing-input { flex: 1; border: none; background: transparent; color: var(--text-main); font-size: 1.1rem; padding: 12px 0; }

        /* 分类与卡片：核心交互修复区 */
        #nav-container { min-height: 200px; }
        .category { margin-bottom: 45px; opacity: 0; animation: fadeInUp 0.8s ease forwards; }
        .category-title {
            font-size: 1.2rem; font-weight: bold; margin-bottom: 18px; color: #fff;
            text-shadow: 0 2px 8px rgba(0,0,0,0.4); padding-left: 12px; border-left: 4px solid var(--accent-color);
        }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }

        .card {
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 18px; padding: 20px; display: flex; align-items: center; gap: 16px; 
            border: 1px solid var(--glass-border); 
            transition: transform 0.1s ease, background 0.3s ease, box-shadow 0.3s ease; /* 极速响应缩放 */
            position: relative; overflow: hidden; text-decoration: none; color: inherit;
        }

        /* 桌面端悬停动效 */
        @media (hover: hover) {
            .card:hover { transform: translateY(-6px); background: var(--card-hover); border-color: var(--accent-color); box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
            .card::after {
                content: ""; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
                background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); transition: 0.5s;
            }
            .card:hover::after { left: 100%; }
            .card:hover .icon { transform: rotate(12deg) scale(1.1); }
        }

        /* 移动端/点击反馈：还原为瞬时响应 */
        .card:active { 
            transform: scale(0.95); 
            background: var(--card-hover);
        }

        .icon { font-size: 2.2rem; transition: transform 0.3s ease; min-width: 45px; text-align: center; }

        .footer-download {
            margin-top: 40px; padding: 15px 35px; background: var(--glass-bg); 
            backdrop-filter: blur(20px); border-radius: 40px; border: 1px solid var(--glass-border);
            transition: transform 0.1s ease;
        }
        .footer-download:active { transform: scale(0.96); }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 600px) { 
            .grid { grid-template-columns: 1fr; } .header h1 { font-size: 1.8rem; }
            .fixed-bg { transform: none !important; }
        }
    </style>
</head>
<body>

<div class="fixed-bg" id="bg-layer"></div>
<div class="overlay"></div>

<div class="container">
    <div class="header">
        <h1>山本小面包🍞的导航页</h1>
        <div id="hitokoto">连接异世界中...</div>
    </div>

    <div class="search-area">
        <form class="bing-search-container" action="https://www.bing.com/search" method="get" target="_blank">
            <div class="bing-icon-wrapper">
                <img src="https://picui.ogmua.cn/s1/2026/03/30/69c94d3fbf8c8.webp" alt="Bing" style="width:100%; height:100%;">
            </div>
            <input type="text" name="q" class="bing-input" placeholder="在 Bing 中搜索..." autocomplete="off">
        </form>
    </div>

    <div id="nav-container"></div>

    <div class="footer-download">
        喜欢背景图吗? <a id="download-link" href="#" target="_blank" style="color: var(--download-link); text-decoration: none; font-weight: bold;">点击下载</a>
    </div>
</div>

<script>
    // 背景预加载逻辑
    async function initBackground() {
        const bgUrl = 'https://api.yppp.net/pc.php';
        const bgLayer = document.getElementById('bg-layer');
        const downloadLink = document.getElementById('download-link');

        try {
            const res = await fetch(bgUrl);
            const finalUrl = res.ok ? res.url : bgUrl;
            const img = new Image();
            img.src = finalUrl;
            img.onload = () => {
                bgLayer.style.backgroundImage = `url('${finalUrl}')`;
                bgLayer.style.opacity = '1';
                downloadLink.href = finalUrl;
            };
        } catch (e) {
            bgLayer.style.backgroundImage = `url('${bgUrl}')`;
            bgLayer.style.opacity = '1';
        }
    }

    // 视差控制（仅PC）
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    if (!isMobile) {
        window.addEventListener('mousemove', (e) => {
            const x = (e.clientX - window.innerWidth / 2) * 0.01;
            const y = (e.clientY - window.innerHeight / 2) * 0.01;
            document.getElementById('bg-layer').style.transform = `translate(${x}px, ${y}px) scale(1.05)`;
        });
    }

    // 数据加载
    async function getHitokoto() {
        const hElem = document.getElementById('hitokoto');
        try {
            const res = await fetch('https://v1.hitokoto.cn?c=a&c=b&c=c');
            const data = await res.json();
            hElem.innerText = `${data.hitokoto} —— 「${data.from}」`;
        } catch (e) { hElem.innerText = "跨越星辰，只为与你相遇。"; }
    }

    async function loadNav() {
        const container = document.getElementById('nav-container');
        try {
            const response = await fetch('./config.yml');
            const yamlText = await response.text();
            const config = jsyaml.load(yamlText);

            container.innerHTML = '';
            config.categories.forEach((cat, index) => {
                const section = document.createElement('div');
                section.className = 'category';
                section.style.animationDelay = `${index * 0.12}s`;
                section.innerHTML = `
                    <div class="category-title">${cat.name}</div>
                    <div class="grid">${cat.links.map(link => `
                        <a href="${link.url}" class="card" target="_blank">
                            <div class="icon">${link.icon || '🔗'}</div>
                            <div class="info">
                                <h3 style="margin:0; font-size:1.1rem;">${link.name}</h3>
                                <p style="margin:5px 0 0; font-size:0.85rem; opacity:0.8; line-height:1.4;">${link.desc || ''}</p>
                            </div>
                        </a>
                    `).join('')}</div>`;
                container.appendChild(section);
            });
        } catch (e) { container.innerHTML = '<p style="text-align:center; color:#fff;">配置加载失败</p>'; }
    }

    window.addEventListener('DOMContentLoaded', () => {
        initBackground();
        getHitokoto();
        loadNav();
    });
</script>

</body>
</html>
