<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>山本小面包🍞的导航页</title>
    <link rel="icon" href="ico.ico">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>

    <style>
        :root {
            /* 液态玻璃核心变量 */
            --liquid-bg: rgba(255, 255, 255, 0.06);
            --liquid-blur: blur(28px) saturate(220%) contrast(1.1);
            /* 基础阴影：只有下方偏移，无上方扩散 */
            --liquid-shadow: 0 15px 40px -10px rgba(0, 0, 0, 0.5);
            --liquid-inset: 
                inset 0 1px 1px rgba(255, 255, 255, 0.4), 
                inset 0 -1px 2px rgba(0, 0, 0, 0.2);
            
            --text-color: #ffffff;
            --accent-blue: #4ea1ff;
            --overlay-color: rgba(0, 0, 0, 0.2);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --liquid-bg: rgba(0, 0, 0, 0.25);
                --overlay-color: rgba(0, 0, 0, 0.45);
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            color: var(--text-color);
            background-color: #000;
            width: 100vw;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 背景锁定逻辑：防止键盘弹出背景缩水 */
        #bg-layer {
            position: fixed;
            top: 0; left: 0; width: 100vw;
            height: 120vh; 
            background-size: cover;
            background-position: center;
            opacity: 0; 
            transition: opacity 1s ease;
            z-index: -2;
            transform: translate3d(0,0,0);
            will-change: opacity;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--overlay-color);
            z-index: -1;
            pointer-events: none;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 50px 24px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        header { text-align: center; margin-bottom: 50px; }
        .main-title {
            font-size: 2.6rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 20px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .hitokoto-capsule {
            display: inline-block;
            padding: 12px 26px;
            border-radius: 40px;
            background: var(--liquid-bg);
            backdrop-filter: var(--liquid-blur);
            -webkit-backdrop-filter: var(--liquid-blur);
            box-shadow: var(--liquid-shadow), var(--liquid-inset);
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            max-width: 90%;
        }
        #hitokoto-text { font-size: 0.95rem; font-weight: 500; }

        /* --- 搜索框：优化现实逻辑，去除上部阴影 --- */
        .search-wrapper {
            display: flex;
            align-items: center;
            background: var(--liquid-bg);
            backdrop-filter: var(--liquid-blur);
            -webkit-backdrop-filter: var(--liquid-blur);
            border-radius: 60px;
            padding: 18px 32px;
            width: 100%;
            max-width: 700px;
            margin: 0 auto 60px auto;
            /* 基础投影：Y轴偏移15px */
            box-shadow: var(--liquid-shadow), var(--liquid-inset);
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }
        
        .search-wrapper:focus-within {
            transform: scale(1.04);
            background: rgba(255, 255, 255, 0.08);
            /* 激活状态：强化下部深度投影，完全去除上部阴影与蓝色外发光 */
            box-shadow: 
                0 35px 70px -15px rgba(0, 0, 0, 0.6), 
                var(--liquid-inset);
        }
        
        .search-wrapper img { width: 22px; height: 22px; margin-right: 15px; }
        .search-wrapper input {
            flex: 1; background: transparent; border: none; color: #fff;
            outline: none; font-size: 1.2rem; font-weight: 500;
        }
        .search-wrapper input::placeholder { color: rgba(255,255,255,0.4); }

        /* 分类标题：蓝色竖条 */
        .category-title {
            font-size: 1.1rem;
            letter-spacing: 2px;
            color: var(--accent-blue);
            margin: 40px 0 20px 0;
            font-weight: 700;
            text-transform: uppercase;
            border-left: 4px solid var(--accent-blue); 
            padding-left: 14px;
            border-radius: 2px;
            text-shadow: 0 0 15px rgba(78, 161, 255, 0.3);
        }
        
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        
        /* 丝滑卡片效果 */
        .nav-card {
            background: var(--liquid-bg);
            backdrop-filter: var(--liquid-blur);
            -webkit-backdrop-filter: var(--liquid-blur);
            border-radius: 26px;
            padding: 26px;
            text-decoration: none;
            color: white;
            opacity: 0;
            transform: translateY(20px) translateZ(0);
            box-shadow: var(--liquid-shadow), var(--liquid-inset);
            will-change: transform, box-shadow;
            transition: 
                transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), 
                box-shadow 0.6s ease,
                background-color 0.5s ease;
        }
        
        .nav-card:hover {
            transform: translateY(-6px) scale(1.03) translateZ(0);
            background-color: rgba(255, 255, 255, 0.12);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), var(--liquid-inset);
        }
        
        .nav-card.show { animation: reveal 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        @keyframes reveal { to { opacity: 1; transform: translateY(0); } }
        
        .card-title { font-size: 1.15rem; font-weight: 700; margin-bottom: 8px; }
        .card-desc { font-size: 0.9rem; color: rgba(255, 255, 255, 0.6); line-height: 1.6; }

        footer { margin-top: auto; padding: 60px 0 30px 0; text-align: center; }
        .footer-glass {
            display: inline-flex; gap: 25px; padding: 14px 35px; border-radius: 50px;
            background: var(--liquid-bg); backdrop-filter: blur(20px);
            box-shadow: var(--liquid-shadow), var(--liquid-inset);
        }
        .footer-link { color: #fff; text-decoration: none; font-size: 0.9rem; font-weight: 600; opacity: 0.7; transition: 0.3s; }
        .footer-link:hover { opacity: 1; color: var(--accent-blue); }

        /* 移动端 2 列布局 */
        @media (max-width: 768px) {
            .nav-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .nav-card { padding: 18px; border-radius: 20px; }
            .card-title { font-size: 1rem; }
            .card-desc { font-size: 0.8rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        }
    </style>
</head>
<body>
    <div id="bg-layer"></div>
    <div class="overlay"></div>
    <div class="container">
        <header>
            <h1 class="main-title">山本小面包🍞的导航页</h1>
            <div class="hitokoto-capsule" id="hitokoto-btn"><span id="hitokoto-text">正在捕捉诗句...</span></div>
        </header>
        <main>
            <div class="search-wrapper">
                <img src="https://picui.ogmua.cn/s1/2026/03/30/69c94d3fbf8c8.webp" alt="Bing">
                <input type="text" id="search-input" placeholder="在 Bing 上搜索" autocomplete="off">
            </div>
            <div id="nav-container"></div>
        </main>
        <footer>
            <div class="footer-glass">
                <a id="download-bg" class="footer-link" href="#" target="_blank">📥 下载壁纸</a>
                <span id="refresh-bg" class="footer-link" style="cursor:pointer">🔄 切换背景</span>
            </div>
        </footer>
    </div>

    <script>
        // 1. 背景高度锁定逻辑（修复键盘弹出缩水问题）
        const fixBackgroundLayer = () => {
            const bg = document.getElementById('bg-layer');
            const physicalHeight = window.screen.height || window.innerHeight;
            bg.style.height = (physicalHeight + 100) + 'px';
            bg.style.width = '100vw';
        };
        fixBackgroundLayer();
        window.addEventListener('resize', fixBackgroundLayer);
        window.addEventListener('orientationchange', () => setTimeout(fixBackgroundLayer, 200));
        window.addEventListener('load', fixBackgroundLayer);

        // 2. 搜索逻辑
        document.getElementById('search-input').onkeypress = (e) => {
            if (e.key === 'Enter' && e.target.value.trim()) {
                window.open(`https://www.bing.com/search?q=${encodeURIComponent(e.target.value)}`, '_blank');
            }
        };

        // 3. 随机背景加载
        const loadBackground = async () => {
            const isMobile = window.innerWidth <= 768;
            const api = isMobile ? 'https://api.yppp.net/pe.php' : 'https://api.yppp.net/pc.php';
            const bg = document.getElementById('bg-layer');
            try {
                const res = await fetch(api);
                const realUrl = res.url;
                const img = new Image();
                img.src = realUrl;
                img.onload = () => {
                    bg.style.backgroundImage = `url('${realUrl}')`;
                    bg.style.opacity = 1;
                    document.getElementById('download-bg').href = realUrl;
                };
            } catch (e) { bg.style.backgroundImage = `url('${api}')`; bg.style.opacity = 1; }
        };
        loadBackground();
        document.getElementById('refresh-bg').onclick = () => {
            document.getElementById('bg-layer').style.opacity = 0;
            setTimeout(loadBackground, 400);
        };

        // 4. 一言渲染
        const fetchHitokoto = async () => {
            const el = document.getElementById('hitokoto-text');
            try {
                const res = await fetch('https://v1.hitokoto.cn?max_length=35');
                const data = await res.json();
                el.innerText = `${data.hitokoto} —— 「${data.from}」`;
            } catch (e) { el.innerText = "纵使疾风起，人生不言弃。"; }
        };
        fetchHitokoto();
        document.getElementById('hitokoto-btn').onclick = fetchHitokoto;

        // 5. 导航数据渲染
        const renderNav = async () => {
            const container = document.getElementById('nav-container');
            try {
                const res = await fetch('./config.yml');
                const yamlText = await res.text();
                const config = jsyaml.load(yamlText);
                let delay = 0;
                config.categories.forEach(cat => {
                    const h2 = document.createElement('h2');
                    h2.className = 'category-title';
                    h2.innerText = cat.name;
                    container.appendChild(h2);
                    const grid = document.createElement('div');
                    grid.className = 'nav-grid';
                    cat.links.forEach(link => {
                        const a = document.createElement('a');
                        a.className = 'nav-card';
                        a.href = link.url; a.target = '_blank';
                        a.innerHTML = `<div class="card-title">${link.title}</div><div class="card-desc">${link.desc}</div>`;
                        a.style.animationDelay = `${delay * 0.05}s`;
                        delay++;
                        grid.appendChild(a);
                        requestAnimationFrame(() => a.classList.add('show'));
                    });
                    container.appendChild(grid);
                });
            } catch (e) { console.error("Config error"); }
        };
        renderNav();
    </script>
</body>
</html>
