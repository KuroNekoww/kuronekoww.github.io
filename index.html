<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>山本小面包🍞的导航页</title>
    <link rel="icon" href="ico.ico">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>

    <style>
        :root {
            /* 提取自 Liunian / iOS 26 液态玻璃的极致参数 */
            --liquid-bg: rgba(255, 255, 255, 0.02);
            --liquid-blur: blur(30px) saturate(250%) contrast(1.1) brightness(1.05);
            /* 边缘液态高光与水滴体积感 */
            --liquid-edge: inset 0 1px 2px rgba(255, 255, 255, 0.4), 
                           inset 0 -1px 2px rgba(0, 0, 0, 0.1),
                           0 10px 40px -10px rgba(0, 0, 0, 0.3);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --liquid-bg: rgba(0, 0, 0, 0.1);
                --liquid-blur: blur(30px) saturate(250%) contrast(1.2) brightness(0.9);
                --liquid-edge: inset 0 1px 2px rgba(255, 255, 255, 0.15), 
                               inset 0 -1px 2px rgba(0, 0, 0, 0.4),
                               0 15px 40px -10px rgba(0, 0, 0, 0.6);
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
            width: 100vw;
            overflow-x: hidden;
        }

        /* 背景层：负责承载图片 */
        #bg-layer {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 120vh; 
            background-size: cover;
            background-position: center;
            opacity: 0; 
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: -2;
        }

        /* 核心液态容器样式 (复用类) */
        .liquid-glass {
            background: var(--liquid-bg);
            backdrop-filter: var(--liquid-blur);
            -webkit-backdrop-filter: var(--liquid-blur);
            box-shadow: var(--liquid-edge);
            border: none;
            /* 防止背景溢出破坏水滴感 */
            transform: translateZ(0); 
        }

        /* 动态反色文字：液态玻璃灵魂属性 */
        /* 通过白色文字与背景的差值计算，实现背景亮字黑，背景暗字白 */
        .dynamic-text {
            color: #ffffff;
            mix-blend-mode: difference;
            /* 略微降低透明度，让反色不至于过于刺眼生硬 */
            opacity: 0.9; 
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 50px 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        header { text-align: center; margin-bottom: 50px; }
        
        .main-title {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        /* -------------------------- */
        /* 复刻 Liunian 搜索框样式   */
        /* -------------------------- */
        .search-wrapper {
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 680px;
            margin: 0 auto 60px auto;
            padding: 16px 28px;
            border-radius: 60px; /* 大曲率水滴形 */
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.4s ease;
        }
        
        .search-wrapper:focus-within {
            transform: scale(1.03);
            /* 聚焦时加深透镜边缘阴影 */
            box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.5), 
                        inset 0 -1px 2px rgba(0, 0, 0, 0.1),
                        0 20px 50px -10px rgba(0, 0, 0, 0.4);
        }

        .search-icon {
            width: 24px;
            height: 24px;
            margin-right: 15px;
            /* 同样应用反色逻辑 */
            fill: #ffffff;
            mix-blend-mode: difference;
            opacity: 0.8;
        }

        .search-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-size: 1.15rem;
            font-weight: 500;
            /* 输入框文字同样动态反色 */
            color: #ffffff;
            mix-blend-mode: difference;
        }
        .search-wrapper input::placeholder {
            color: #ffffff;
            opacity: 0.5;
        }

        /* -------------------------- */
        /* 音乐底栏风格：一言 & 导航  */
        /* -------------------------- */
        .hitokoto-capsule {
            display: inline-block;
            padding: 12px 28px;
            border-radius: 40px;
            cursor: pointer;
            transition: transform 0.2s ease;
            max-width: 90%;
        }
        .hitokoto-capsule:active { transform: scale(0.96); }
        #hitokoto-text { font-size: 0.95rem; font-weight: 500; }

        .category-title {
            font-size: 1.1rem;
            margin: 40px 0 20px 10px;
            font-weight: 600;
            opacity: 0.8;
        }
        
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        
        .nav-card {
            padding: 24px;
            border-radius: 28px; /* 类似音乐播放器底栏的圆润度 */
            text-decoration: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
            opacity: 0;
            transform: translateY(10px) scale(0.98);
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        
        .nav-card.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .nav-card:hover {
            transform: translateY(-3px) scale(1.02);
            /* 悬浮时提高亮度模拟液体流动 */
            background: rgba(255, 255, 255, 0.06);
        }
        
        .card-title { font-size: 1.1rem; font-weight: 600; }
        .card-desc { font-size: 0.85rem; opacity: 0.7; line-height: 1.4; }

        footer { margin-top: auto; padding: 60px 0 30px 0; text-align: center; }
        .footer-glass {
            display: inline-block;
            padding: 14px 30px;
            border-radius: 30px;
            font-size: 0.9rem;
            display: inline-flex;
            gap: 20px;
            align-items: center;
        }
        .footer-link {
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .footer-link:hover { opacity: 0.6; }

        @media (max-width: 768px) {
            .nav-grid { grid-template-columns: 1fr; gap: 16px; }
            .search-wrapper { padding: 14px 22px; margin-bottom: 40px; }
            .nav-card { padding: 20px; border-radius: 24px; }
            .footer-glass { flex-direction: column; gap: 10px; border-radius: 24px; }
        }
    </style>
</head>
<body>

    <div id="bg-layer"></div>

    <div class="container">
        <header>
            <h1 class="main-title dynamic-text">山本小面包🍞的导航页</h1>
            <div class="hitokoto-capsule liquid-glass" id="hitokoto-btn">
                <span id="hitokoto-text" class="dynamic-text">正在捕捉诗句...</span>
            </div>
        </header>

        <main>
            <div class="search-wrapper liquid-glass">
                <svg class="search-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                </svg>
                <input type="text" id="search-input" placeholder="在 Bing 上搜索..." autocomplete="off">
            </div>
            
            <div id="nav-container"></div>
        </main>

        <footer>
            <div class="footer-glass liquid-glass">
                <a id="download-bg" class="footer-link dynamic-text" href="#" target="_blank">📥 下载壁纸</a>
                <span id="refresh-bg" class="footer-link dynamic-text">🔄 切换壁纸</span>
            </div>
        </footer>
    </div>

    <script>
        // 背景加载自适应
        const fixBackgroundLayer = () => {
            const bg = document.getElementById('bg-layer');
            bg.style.height = (window.innerHeight + 100) + 'px';
        };
        window.addEventListener('resize', fixBackgroundLayer);
        fixBackgroundLayer();

        // 随机壁纸加载
        const loadBackground = async () => {
            const isMobile = window.innerWidth <= 768;
            const api = isMobile ? 'https://api.yppp.net/pe.php' : 'https://api.yppp.net/pc.php';
            const bg = document.getElementById('bg-layer');
            
            try {
                const res = await fetch(api);
                const realUrl = res.url;
                const img = new Image();
                img.src = realUrl;
                img.onload = () => {
                    bg.style.backgroundImage = `url('${realUrl}')`;
                    bg.style.opacity = 1;
                    document.getElementById('download-bg').href = realUrl;
                };
            } catch (e) {
                bg.style.backgroundImage = `url('${api}')`;
                bg.style.opacity = 1;
            }
        };
        loadBackground();

        document.getElementById('refresh-bg').onclick = () => {
            document.getElementById('bg-layer').style.opacity = 0;
            setTimeout(loadBackground, 800);
        };

        // 搜索回车跳转
        document.getElementById('search-input').onkeypress = (e) => {
            if (e.key === 'Enter' && e.target.value.trim()) {
                window.open(`https://www.bing.com/search?q=${encodeURIComponent(e.target.value)}`, '_blank');
            }
        };

        // 一言 API
        const fetchHitokoto = async () => {
            const el = document.getElementById('hitokoto-text');
            try {
                const res = await fetch('https://v1.hitokoto.cn?max_length=35');
                const data = await res.json();
                el.innerText = `${data.hitokoto} —— 「${data.from}」`;
            } catch (e) { el.innerText = "纵使疾风起，人生不言弃。 —— 「起风了」"; }
        };
        fetchHitokoto();
        document.getElementById('hitokoto-btn').onclick = fetchHitokoto;

        // 加载 YAML 导航配置
        const renderNav = async () => {
            const container = document.getElementById('nav-container');
            try {
                const res = await fetch('./config.yml');
                const yamlText = await res.text();
                const config = jsyaml.load(yamlText);
                let delay = 0;
                
                config.categories.forEach(cat => {
                    const h2 = document.createElement('h2');
                    h2.className = 'category-title dynamic-text';
                    h2.innerText = cat.name;
                    container.appendChild(h2);
                    
                    const grid = document.createElement('div');
                    grid.className = 'nav-grid';
                    
                    cat.links.forEach(link => {
                        const a = document.createElement('a');
                        a.className = 'nav-card liquid-glass';
                        a.href = link.url;
                        a.target = '_blank';
                        // 将文本元素单独包裹，应用反色逻辑
                        a.innerHTML = `
                            <div class="card-title dynamic-text">${link.title}</div>
                            <div class="card-desc dynamic-text">${link.desc}</div>
                        `;
                        a.style.transitionDelay = `${delay * 0.05}s`;
                        delay++;
                        grid.appendChild(a);
                        
                        // 触发入场动画
                        requestAnimationFrame(() => {
                            setTimeout(() => a.classList.add('show'), 100);
                        });
                    });
                    container.appendChild(grid);
                });
            } catch (e) { console.error("Config load error", e); }
        };
        renderNav();
    </script>
</body>
</html>
