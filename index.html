<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>山本小面包🍞的导航页</title>
    <link rel="icon" href="ico.ico">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>

    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
            --overlay-color: rgba(0, 0, 0, 0.25);
            --accent-blue: #3b82f6; 
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --glass-bg: rgba(0, 0, 0, 0.45);
                --glass-border: rgba(255, 255, 255, 0.08);
                --overlay-color: rgba(0, 0, 0, 0.4);
            }
        }

        /* 1. 彻底切断原生滚动 */
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; 
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-color);
            -webkit-tap-highlight-color: transparent;
        }

        #bg-layer {
            position: fixed;
            top: 0; left: 0; 
            /* 修复横向滚动：把 100vw 改回 100% */
            width: 100%; 
            background-size: cover;
            background-position: center;
            opacity: 0; 
            transition: opacity 0.8s ease-in-out;
            z-index: -2;
            transform: translate3d(0,0,0);
            -webkit-transform: translate3d(0,0,0);
            backface-visibility: hidden;
            will-change: opacity;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; 
            /* 修复横向滚动：把 100vw 改回 100% */
            width: 100%; 
            height: 100vh;
            background: var(--overlay-color);
            z-index: -1;
            pointer-events: none;
        }

        /* 2. 内部滚动接管层：强制锁死横向滚动 */
        .scroll-wrapper {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            overflow-y: auto; 
            overflow-x: hidden; /* 修复横向滚动的核心 */
            -webkit-overflow-scrolling: touch; 
            z-index: 1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            min-height: 100%;
        }

        header { text-align: center; margin-bottom: 40px; }
        .main-title { font-size: 2.5rem; font-weight: bold; text-shadow: 0 4px 15px rgba(0,0,0,0.3); margin-bottom: 15px; }

        .hitokoto-capsule {
            display: inline-block;
            padding: 10px 22px;
            border-radius: 50px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            cursor: pointer;
            transition: transform 0.2s;
            max-width: 90%;
        }
        .hitokoto-capsule:active { transform: scale(0.96); }
        #hitokoto-text { font-size: 0.9rem; opacity: 0.9; line-height: 1.5; }

        .search-wrapper {
            display: flex;
            align-items: center;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 50px;
            padding: 12px 25px;
            width: 100%;
            max-width: 600px;
            margin: 0 auto 50px auto;
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .search-wrapper:focus-within {
            border-color: var(--accent-blue);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3), 0 8px 32px rgba(0,0,0,0.2);
        }
        .search-wrapper img { width: 20px; height: 20px; margin-right: 12px; }
        .search-wrapper input { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 1.05rem; }

        .category-title { font-size: 1.2rem; border-left: 4px solid var(--accent-blue); padding-left: 12px; margin: 30px 0 15px 0; }
        .nav-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 15px; }
        
        .nav-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 20px;
            text-decoration: none;
            color: white;
            opacity: 0;
            transform: translateY(15px);
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), background 0.3s;
        }
        .nav-card.show { animation: fadeUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
        .card-title { font-size: 1.05rem; font-weight: 600; margin-bottom: 4px; }
        .card-desc { font-size: 0.8rem; color: rgba(255, 255, 255, 0.6); line-height: 1.4; }

        footer { margin-top: auto; padding: 40px 0 20px 0; text-align: center; }
        .footer-glass {
            display: inline-block;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 12px 25px;
            border-radius: 20px;
            font-size: 0.85rem;
            line-height: 2;
        }
        .normal-text { color: rgba(255, 255, 255, 0.7); }
        .highlight-blue { color: var(--accent-blue) !important; font-weight: bold; text-decoration: none; cursor: pointer; }

        @media (max-width: 768px) {
            .nav-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .main-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div id="bg-layer"></div>
    <div class="overlay"></div>

    <div class="scroll-wrapper">
        <div class="container">
            <header>
                <h1 class="main-title">山本小面包🍞的导航页</h1>
                <div class="hitokoto-capsule" id="hitokoto-btn">
                    <span id="hitokoto-text">正在捕捉诗句...</span>
                </div>
            </header>

            <main>
                <div class="search-wrapper">
                    <img src="https://picui.ogmua.cn/s1/2026/03/30/69c94d3fbf8c8.webp" alt="Bing">
                    <input type="text" id="search-input" placeholder="在 Bing 上搜索" autocomplete="off">
                </div>
                <div id="nav-container"></div>
            </main>

            <footer>
                <div class="footer-glass">
                    <div class="normal-text">喜欢背景图吗？<a id="download-bg" class="highlight-blue" target="_blank">点击下载</a></div>
                    <div class="normal-text">不喜欢背景图？<span id="refresh-bg" class="highlight-blue">换一个</span></div>
                </div>
            </footer>
        </div>
    </div>

    <script>
        const fixBg = () => {
            const bg = document.getElementById('bg-layer');
            const h = window.screen.height || window.innerHeight;
            bg.style.height = (h + 100) + 'px'; 
        };
        fixBg();
        window.addEventListener('orientationchange', () => setTimeout(fixBg, 200));

        const fetchHitokoto = async () => {
            const el = document.getElementById('hitokoto-text');
            try {
                const res = await fetch('https://v1.hitokoto.cn?max_length=35');
                const d = await res.json();
                el.innerText = `${d.hitokoto} —— 「${d.from}」`;
            } catch (e) { el.innerText = "纵使疾风起，人生不言弃。 —— 「起风了」"; }
        };
        fetchHitokoto();
        document.getElementById('hitokoto-btn').onclick = fetchHitokoto;

        document.getElementById('search-input').onkeypress = (e) => {
            if (e.key === 'Enter' && e.target.value.trim()) {
                window.open(`https://www.bing.com/search?q=${encodeURIComponent(e.target.value)}`, '_blank');
            }
        };

        const loadBg = async () => {
            const api = window.innerWidth <= 768 ? 'https://api.yppp.net/pe.php' : 'https://api.yppp.net/pc.php';
            try {
                const res = await fetch(api);
                const url = res.url;
                const img = new Image();
                img.src = url;
                img.onload = () => {
                    const b = document.getElementById('bg-layer');
                    b.style.backgroundImage = `url('${url}')`;
                    b.style.opacity = 1;
                    document.getElementById('download-bg').href = url;
                };
            } catch (e) { 
                // 3. 核心修复：如果由于跨域限制 fetch 失败，直接暴力赋给背景，确保背景能加载出来
                const b = document.getElementById('bg-layer');
                b.style.backgroundImage = `url('${api}')`;
                b.style.opacity = 1;
                document.getElementById('download-bg').href = api; // 兜底下载链接
            }
        };
        loadBg();
        document.getElementById('refresh-bg').onclick = () => {
            document.getElementById('bg-layer').style.opacity = 0;
            setTimeout(loadBg, 400);
        };

        const renderNav = async () => {
            const container = document.getElementById('nav-container');
            try {
                const res = await fetch('./config.yml');
                const yamlText = await res.text();
                const config = jsyaml.load(yamlText);
                let delay = 0;
                config.categories.forEach(cat => {
                    const h2 = document.createElement('h2'); h2.className = 'category-title'; h2.innerText = cat.name;
                    container.appendChild(h2);
                    const grid = document.createElement('div'); grid.className = 'nav-grid';
                    cat.links.forEach(l => {
                        const a = document.createElement('a'); a.className = 'nav-card'; a.href = l.url; a.target = '_blank';
                        a.innerHTML = `<div class="card-title">${l.title}</div><div class="card-desc">${l.desc}</div>`;
                        a.style.animationDelay = `${delay * 0.05}s`;
                        delay++;
                        grid.appendChild(a);
                        requestAnimationFrame(() => a.classList.add('show'));
                    });
                    container.appendChild(grid);
                });
            } catch (e) { console.warn("YAML config not found or invalid."); }
        };
        renderNav();
    </script>
</body>
</html>
