<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>山本小面包🍞的导航页</title>
    <link rel="icon" href="ico.ico">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>

    <style>
        :root {
            /* 极高饱和度与通透度的液态基色 */
            --liquid-bg: rgba(255, 255, 255, 0.05);
            /* 模拟物理透镜的多层投影：外发散阴影 + 内聚光边缘 */
            --liquid-shadow: 0 20px 50px -10px rgba(0, 0, 0, 0.5);
            /* 核心高光效果：顶部 1px 的白色亮边模拟光源受光面 */
            --liquid-inset: 
                inset 0 1px 2px rgba(255, 255, 255, 0.4), 
                inset 0 -1px 2px rgba(0, 0, 0, 0.1),
                inset 0 10px 20px rgba(255, 255, 255, 0.05);
            
            --text-color: #ffffff;
            --overlay-color: rgba(0, 0, 0, 0.15);
            --accent-blue: #4ea1ff; /* 调亮一点，增加发光感 */
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --liquid-bg: rgba(0, 0, 0, 0.2);
                --liquid-shadow: 0 25px 60px -12px rgba(0, 0, 0, 0.7);
                --liquid-inset: 
                    inset 0 1px 1px rgba(255, 255, 255, 0.15), 
                    inset 0 -1px 2px rgba(0, 0, 0, 0.4),
                    inset 0 5px 15px rgba(255, 255, 255, 0.02);
                --overlay-color: rgba(0, 0, 0, 0.4);
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            color: var(--text-color);
            background-color: #000;
            width: 100vw;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        #bg-layer {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 120vh; 
            background-size: cover;
            background-position: center;
            opacity: 0; 
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: -2;
            transform: translateZ(0);
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--overlay-color);
            backdrop-filter: contrast(1.1); /* 稍微增加全局对比度，让玻璃感更强 */
            z-index: -1;
            pointer-events: none;
        }

        .container {
            max-width: 1000px; /* 收紧一点，视觉更聚焦 */
            margin: 0 auto;
            padding: 60px 24px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        header { text-align: center; margin-bottom: 60px; }
        .main-title {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 20px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* 一言 capsule */
        .hitokoto-capsule {
            display: inline-block;
            padding: 12px 28px;
            border-radius: 40px;
            background: var(--liquid-bg);
            backdrop-filter: blur(25px) saturate(200%);
            -webkit-backdrop-filter: blur(25px) saturate(200%);
            box-shadow: var(--liquid-shadow), var(--liquid-inset);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .hitokoto-capsule:active { transform: scale(0.96); opacity: 0.8; }
        #hitokoto-text { font-size: 0.95rem; font-weight: 500; opacity: 0.9; }

        /* --- 搜索框：优化后的巨型高光液态透镜 --- */
        .search-wrapper {
            display: flex;
            align-items: center;
            background: var(--liquid-bg);
            /* 极高的模糊度与饱和度 */
            backdrop-filter: blur(30px) saturate(250%) contrast(1.1);
            -webkit-backdrop-filter: blur(30px) saturate(250%) contrast(1.1);
            border-radius: 60px; 
            padding: 18px 35px; /* 增加内边距使其更高 */
            width: 100%;
            max-width: 720px; /* 调大搜索框 */
            margin: 0 auto 70px auto;
            box-shadow: var(--liquid-shadow), var(--liquid-inset);
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }
        
        .search-wrapper:focus-within {
            transform: scale(1.04); /* 适当放大 */
            background: rgba(255, 255, 255, 0.08);
            /* 聚焦时强化顶部高光 */
            box-shadow: 
                0 30px 60px -15px rgba(0, 0, 0, 0.6), 
                inset 0 1.5px 2px rgba(255, 255, 255, 0.6),
                inset 0 0 25px rgba(78, 161, 255, 0.15); /* 淡淡的蓝色内聚光 */
        }
        
        .search-wrapper img { width: 24px; height: 24px; margin-right: 18px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }
        .search-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            outline: none;
            font-size: 1.2rem;
            font-weight: 500;
        }
        .search-wrapper input::placeholder { color: rgba(255,255,255,0.4); }

        /* 导航部分 */
        .category-title {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-blue);
            margin: 40px 0 20px 10px;
            font-weight: 700;
            text-shadow: 0 0 15px rgba(78, 161, 255, 0.4);
        }
        
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        
        .nav-card {
            background: var(--liquid-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 28px;
            padding: 26px;
            text-decoration: none;
            color: white;
            opacity: 0;
            transform: translateY(20px);
            box-shadow: var(--liquid-shadow), var(--liquid-inset);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }
        
        .nav-card:hover {
            transform: translateY(-6px) scale(1.02);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6), var(--liquid-inset);
        }
        
        .nav-card.show { animation: reveal 0.8s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
        @keyframes reveal { to { opacity: 1; transform: translateY(0); } }
        
        .card-title { font-size: 1.15rem; font-weight: 700; margin-bottom: 8px; }
        .card-desc { font-size: 0.9rem; color: rgba(255, 255, 255, 0.6); line-height: 1.6; font-weight: 400; }

        footer { margin-top: auto; padding: 80px 0 40px 0; text-align: center; }
        .footer-glass {
            display: inline-flex;
            gap: 25px;
            background: var(--liquid-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 14px 35px;
            border-radius: 50px;
            box-shadow: var(--liquid-shadow), var(--liquid-inset);
        }
        .footer-link {
            color: var(--text-color);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            opacity: 0.7;
            transition: all 0.3s ease;
        }
        .footer-link:hover { opacity: 1; color: var(--accent-blue); }

        @media (max-width: 768px) {
            .container { padding: 40px 20px; }
            .main-title { font-size: 2rem; }
            .search-wrapper { padding: 15px 25px; margin-bottom: 40px; }
            .nav-grid { grid-template-columns: 1fr; gap: 15px; }
            .footer-glass { flex-direction: column; gap: 12px; border-radius: 30px; }
        }
    </style>
</head>
<body>

    <div id="bg-layer"></div>
    <div class="overlay"></div>

    <div class="container">
        <header>
            <h1 class="main-title">山本小面包🍞的导航页</h1>
            <div class="hitokoto-capsule" id="hitokoto-btn">
                <span id="hitokoto-text">正在捕捉诗句...</span>
            </div>
        </header>

        <main>
            <div class="search-wrapper">
                <img src="https://picui.ogmua.cn/s1/2026/03/30/69c94d3fbf8c8.webp" alt="Bing">
                <input type="text" id="search-input" placeholder="输入搜索内容..." autocomplete="off">
            </div>
            
            <div id="nav-container"></div>
        </main>

        <footer>
            <div class="footer-glass">
                <a id="download-bg" class="footer-link" href="#" target="_blank">📥 下载壁纸</a>
                <span id="refresh-bg" class="footer-link" style="cursor:pointer">🔄 切换背景</span>
            </div>
        </footer>
    </div>

    <script>
        // 背景处理逻辑
        const fixBackgroundLayer = () => {
            const bg = document.getElementById('bg-layer');
            bg.style.height = (window.innerHeight + 100) + 'px';
        };
        fixBackgroundLayer();
        window.addEventListener('resize', fixBackgroundLayer);

        // 一言 API
        const fetchHitokoto = async () => {
            const el = document.getElementById('hitokoto-text');
            try {
                const res = await fetch('https://v1.hitokoto.cn?max_length=35');
                const data = await res.json();
                el.innerText = `${data.hitokoto} —— 「${data.from}」`;
            } catch (e) { el.innerText = "纵使疾风起，人生不言弃。 —— 「起风了」"; }
        };
        fetchHitokoto();
        document.getElementById('hitokoto-btn').onclick = fetchHitokoto;

        // 搜索跳转
        document.getElementById('search-input').onkeypress = (e) => {
            if (e.key === 'Enter' && e.target.value.trim()) {
                window.open(`https://www.bing.com/search?q=${encodeURIComponent(e.target.value)}`, '_blank');
            }
        };

        // 随机背景
        const loadBackground = async () => {
            const isMobile = window.innerWidth <= 768;
            const api = isMobile ? 'https://api.yppp.net/pe.php' : 'https://api.yppp.net/pc.php';
            const bg = document.getElementById('bg-layer');
            try {
                const res = await fetch(api);
                const realUrl = res.url;
                const img = new Image();
                img.src = realUrl;
                img.onload = () => {
                    bg.style.backgroundImage = `url('${realUrl}')`;
                    bg.style.opacity = 1;
                    document.getElementById('download-bg').href = realUrl;
                };
            } catch (e) {
                bg.style.backgroundImage = `url('${api}')`;
                bg.style.opacity = 1;
            }
        };
        loadBackground();

        document.getElementById('refresh-bg').onclick = () => {
            document.getElementById('bg-layer').style.opacity = 0;
            setTimeout(loadBackground, 500);
        };

        // 导航渲染
        const renderNav = async () => {
            const container = document.getElementById('nav-container');
            try {
                const res = await fetch('./config.yml');
                const yamlText = await res.text();
                const config = jsyaml.load(yamlText);
                let delay = 0;
                config.categories.forEach(cat => {
                    const h2 = document.createElement('h2');
                    h2.className = 'category-title';
                    h2.innerText = cat.name;
                    container.appendChild(h2);
                    const grid = document.createElement('div');
                    grid.className = 'nav-grid';
                    cat.links.forEach(link => {
                        const a = document.createElement('a');
                        a.className = 'nav-card';
                        a.href = link.url;
                        a.target = '_blank';
                        a.innerHTML = `<div class="card-title">${link.title}</div><div class="card-desc">${link.desc}</div>`;
                        a.style.animationDelay = `${delay * 0.06}s`;
                        delay++;
                        grid.appendChild(a);
                        requestAnimationFrame(() => a.classList.add('show'));
                    });
                    container.appendChild(grid);
                });
            } catch (e) { console.error("Config load error"); }
        };
        renderNav();
    </script>
</body>
</html>
