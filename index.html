<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>山本小面包🍞的导航页</title>
    <link rel="icon" href="ico.ico">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>

    <style>
        :root {
            --liquid-bg: rgba(255, 255, 255, 0.08);
            --liquid-blur: blur(28px) saturate(220%);
            /* 精简阴影：去除了模糊扩散，仅保留上下轻微的立体感 */
            --liquid-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            --liquid-inset: 
                inset 0 1px 0px rgba(255, 255, 255, 0.2), 
                inset 0 -1px 0px rgba(0, 0, 0, 0.2);
            
            --text-color: #ffffff;
            --accent-blue: #4ea1ff;
            --overlay-color: rgba(0, 0, 0, 0.2);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --liquid-bg: rgba(255, 255, 255, 0.05);
                --liquid-shadow: 0 5px 12px rgba(0, 0, 0, 0.6);
                --liquid-inset: 
                    inset 0 1px 0px rgba(255, 255, 255, 0.1), 
                    inset 0 -1px 0px rgba(0, 0, 0, 0.4);
                --overlay-color: rgba(0, 0, 0, 0.5);
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            color: var(--text-color);
            background-color: #000;
            width: 100vw;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        #bg-layer {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 120vh;
            background-size: cover; background-position: center;
            opacity: 0; transition: opacity 1s ease;
            z-index: -2; transform: translate3d(0,0,0);
            will-change: opacity;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--overlay-color); z-index: -1; pointer-events: none;
        }

        .container {
            max-width: 1100px; margin: 0 auto; padding: 40px 20px;
            display: flex; flex-direction: column; min-height: 100vh;
            position: relative; z-index: 1;
        }

        header { text-align: center; margin-bottom: 40px; }
        
        .main-title {
            font-size: 2.5rem; font-weight: 800; letter-spacing: -1px;
            margin-bottom: 18px; text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .hitokoto-capsule {
            display: inline-block;
            padding: 10px 24px;
            border-radius: 40px;
            background: var(--liquid-bg);
            backdrop-filter: var(--liquid-blur);
            -webkit-backdrop-filter: var(--liquid-blur);
            box-shadow: var(--liquid-shadow), var(--liquid-inset);
            cursor: pointer;
            max-width: 95%;
        }
        #hitokoto-text { font-size: 0.92rem; font-weight: 500; }

        .search-wrapper {
            display: flex; align-items: center;
            background: var(--liquid-bg); backdrop-filter: var(--liquid-blur);
            -webkit-backdrop-filter: var(--liquid-blur);
            border-radius: 50px; padding: 16px 30px;
            width: 100%; max-width: 680px; margin: 0 auto 50px auto;
            box-shadow: var(--liquid-shadow), var(--liquid-inset);
            transition: transform 0.4s cubic-bezier(0.2, 0, 0.2, 1), background-color 0.8s ease;
        }
        .search-wrapper:focus-within { transform: scale(1.02); background: rgba(255, 255, 255, 0.12); box-shadow: none; }
        .search-wrapper img { width: 22px; height: 22px; margin-right: 14px; }
        .search-wrapper input { flex: 1; background: transparent; border: none; color: #fff; outline: none; font-size: 1.15rem; font-weight: 500; }

        /* 分类标题：改为白色，保留蓝色竖条 */
        .category-title {
            font-size: 1.1rem; 
            color: #ffffff; /* 改为白色 */
            margin: 35px 0 20px 0;
            font-weight: 700; 
            border-left: 4px solid var(--accent-blue);
            padding-left: 14px; 
            border-radius: 2px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        
        .nav-card {
            background: var(--liquid-bg); backdrop-filter: var(--liquid-blur);
            -webkit-backdrop-filter: var(--liquid-blur);
            border-radius: 24px; padding: 24px; text-decoration: none;
            color: white; opacity: 0; transform: translateY(20px);
            box-shadow: var(--liquid-shadow), var(--liquid-inset);
            cursor: default;
        }
        .nav-card.show { animation: reveal 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        @keyframes reveal { to { opacity: 1; transform: translateY(0); } }
        
        .card-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }
        .card-desc { font-size: 0.88rem; color: rgba(255, 255, 255, 0.55); line-height: 1.5; }

        /* 移动端样式 (UA判断触发) */
        body.mobile-mode .main-title {
            font-size: 1.4rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        body.mobile-mode .nav-grid {
            grid-template-columns: repeat(2, 1fr); gap: 12px;
        }
        body.mobile-mode .nav-card {
            padding: 18px; border-radius: 18px; cursor: pointer;
        }
        body.mobile-mode .card-title { font-size: 0.95rem; }
        body.mobile-mode .card-desc {
            font-size: 0.78rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }

        footer { margin-top: auto; padding: 60px 0 30px 0; text-align: center; }
        .footer-glass {
            display: inline-flex; gap: 20px; padding: 14px 35px; border-radius: 50px;
            background: var(--liquid-bg); backdrop-filter: blur(20px);
            box-shadow: var(--liquid-shadow), var(--liquid-inset);
        }
        .footer-link { color: #fff; text-decoration: none; font-size: 0.85rem; font-weight: 600; opacity: 0.7; }
    </style>
</head>
<body id="main-body">
    <div id="bg-layer"></div>
    <div class="overlay"></div>
    <div class="container">
        <header>
            <h1 class="main-title">山本小面包🍞的导航页</h1>
            <div class="hitokoto-capsule" id="hitokoto-btn"><span id="hitokoto-text">正在捕捉诗句...</span></div>
        </header>
        <main>
            <div class="search-wrapper">
                <img src="https://picui.ogmua.cn/s1/2026/03/30/69c94d3fbf8c8.webp" alt="Bing">
                <input type="text" id="search-input" placeholder="在 Bing 上搜索" autocomplete="off">
            </div>
            <div id="nav-container"></div>
        </main>
        <footer>
            <div class="footer-glass">
                <a id="download-bg" class="footer-link" href="#" target="_blank">📥 下载壁纸</a>
                <span id="refresh-bg" class="footer-link" style="cursor:pointer">🔄 切换背景</span>
            </div>
        </footer>
    </div>

    <script>
        const checkDevice = () => {
            const ua = navigator.userAgent;
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua);
            if (isMobile) document.getElementById('main-body').classList.add('mobile-mode');
            return isMobile;
        };
        const isMobileDevice = checkDevice();

        const fixBackgroundLayer = () => {
            const bg = document.getElementById('bg-layer');
            bg.style.height = (window.screen.height || window.innerHeight) + 100 + 'px';
            bg.style.width = '100vw';
        };
        fixBackgroundLayer();
        window.addEventListener('resize', fixBackgroundLayer);

        document.getElementById('search-input').onkeypress = (e) => {
            if (e.key === 'Enter' && e.target.value.trim()) {
                window.open(`https://www.bing.com/search?q=${encodeURIComponent(e.target.value)}`, '_blank');
            }
        };

        const loadBackground = async () => {
            const api = isMobileDevice ? 'https://api.yppp.net/pe.php' : 'https://api.yppp.net/pc.php';
            const bg = document.getElementById('bg-layer');
            try {
                const res = await fetch(api);
                const realUrl = res.url;
                const img = new Image();
                img.src = realUrl;
                img.onload = () => {
                    bg.style.backgroundImage = `url('${realUrl}')`;
                    bg.style.opacity = 1;
                    document.getElementById('download-bg').href = realUrl;
                };
            } catch (e) { bg.style.backgroundImage = `url('${api}')`; bg.style.opacity = 1; }
        };
        loadBackground();
        document.getElementById('refresh-bg').onclick = () => {
            document.getElementById('bg-layer').style.opacity = 0;
            setTimeout(loadBackground, 400);
        };

        const fetchHitokoto = async () => {
            const el = document.getElementById('hitokoto-text');
            try {
                const res = await fetch('https://v1.hitokoto.cn?max_length=35');
                const data = await res.json();
                el.innerText = `${data.hitokoto} —— 「${data.from}」`;
            } catch (e) { el.innerText = "纵使疾风起，人生不言弃。"; }
        };
        fetchHitokoto();
        document.getElementById('hitokoto-btn').onclick = fetchHitokoto;

        const renderNav = async () => {
            const container = document.getElementById('nav-container');
            try {
                const res = await fetch('./config.yml');
                const yamlText = await res.text();
                const config = jsyaml.load(yamlText);
                let delay = 0;
                config.categories.forEach(cat => {
                    const h2 = document.createElement('h2');
                    h2.className = 'category-title';
                    h2.innerText = cat.name;
                    container.appendChild(h2);
                    const grid = document.createElement('div');
                    grid.className = 'nav-grid';
                    cat.links.forEach(link => {
                        const a = document.createElement('a');
                        a.className = 'nav-card';
                        a.href = link.url; a.target = '_blank';
                        a.innerHTML = `<div class="card-title">${link.title}</div><div class="card-desc">${link.desc}</div>`;
                        a.style.animationDelay = `${delay * 0.05}s`;
                        delay++;
                        grid.appendChild(a);
                        requestAnimationFrame(() => a.classList.add('show'));
                    });
                    container.appendChild(grid);
                });
            } catch (e) { console.error("Config error"); }
        };
        renderNav();
    </script>
</body>
</html>
