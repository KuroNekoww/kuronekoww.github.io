<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>山本小面包🍞的私人导航页</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.7);
            --text-main: #1e293b;
            --text-muted: #475569;
            --accent-color: #0078d4; /* Bing Blue */
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --glass-bg: rgba(15, 23, 42, 0.7);
                --text-main: #f1f5f9;
                --text-muted: #cbd5e1;
            }
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            /* 背景图设置 */
            background: url('https://api.yppp.net/pc.php') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        /* 背景遮罩，确保文字清晰 */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.2);
            z-index: -1;
        }

        .container { width: 100%; max-width: 900px; z-index: 1; }

        /* 头部区域 */
        .header { text-align: center; margin-bottom: 40px; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
        .header h1 { font-size: 2.5rem; margin: 0; color: #fff; }
        #hitokoto { 
            display: inline-block;
            margin-top: 15px; padding: 8px 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            font-size: 0.95rem;
            color: var(--text-main);
        }

        /* Bing 搜索框 */
        .search-area {
            margin-bottom: 50px;
            display: flex;
            justify-content: center;
        }
        .search-box {
            display: flex;
            align-items: center;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border-radius: 50px;
            padding: 5px 15px;
            width: 100%;
            max-width: 600px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        .search-box:focus-within { transform: scale(1.02); }
        .search-box img { width: 28px; height: 28px; margin-right: 12px; }
        .search-box input {
            flex: 1;
            border: none;
            background: transparent;
            color: var(--text-main);
            font-size: 1.1rem;
            padding: 10px 5px;
            outline: none;
        }

        /* 分类与链接 */
        .category { margin-bottom: 40px; }
        .category-title {
            font-size: 1.2rem; font-weight: bold; margin-bottom: 15px;
            color: #fff; text-shadow: 0 2px 5px rgba(0,0,0,0.5);
            padding-left: 10px; border-left: 4px solid var(--accent-color);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 15px;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 15px;
            padding: 15px;
            text-decoration: none;
            color: inherit;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px) scale(1.02);
            background: rgba(255, 255, 255, 0.9);
            color: #000;
        }
        .card .icon { font-size: 1.8rem; min-width: 40px; text-align: center; }
        .card h3 { margin: 0; font-size: 1rem; }
        .card p { margin: 5px 0 0; font-size: 0.8rem; opacity: 0.8; }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 id="page-title">山本小面包🍞</h1>
        <div id="hitokoto">正在获取一言...</div>
    </div>

    <div class="search-area">
        <form class="search-box" action="https://www.bing.com/search" method="get" target="_blank">
            <img src="https://image.pngaaa.com/445/5409445-middle.png" alt="Bing">
            <input type="text" name="q" placeholder="在网络上搜索内容..." autofocus>
        </form>
    </div>

    <div id="nav-container"></div>
</div>

<script>
    // 1. 获取一言
    fetch('https://v1.hitokoto.cn')
        .then(response => response.json())
        .then(data => {
            const hitokoto = document.getElementById('hitokoto');
            hitokoto.innerText = `${data.hitokoto} —— 「${data.from}」`;
        })
        .catch(console.error);

    // 2. 加载 YAML 配置
    async function loadConfig() {
        try {
            const response = await fetch('./config.yml');
            const yamlText = await response.text();
            const config = jsyaml.load(yamlText);
            render(config);
        } catch (err) {
            console.error("加载配置失败:", err);
        }
    }

    function render(data) {
        if (data.header) document.getElementById('page-title').innerText = data.header.title;
        
        const container = document.getElementById('nav-container');
        container.innerHTML = '';

        data.categories.forEach(cat => {
            const section = document.createElement('div');
            section.className = 'category';
            section.innerHTML = `
                <div class="category-title">${cat.name}</div>
                <div class="grid">
                    ${cat.links.map(link => `
                        <a href="${link.url}" class="card" target="_blank">
                            <div class="icon">${link.icon || '🔗'}</div>
                            <div class="info">
                                <h3>${link.name}</h3>
                                <p>${link.desc || ''}</p>
                            </div>
                        </a>
                    `).join('')}
                </div>
            `;
            container.appendChild(section);
        });
    }

    window.addEventListener('DOMContentLoaded', loadConfig);
</script>

</body>
</html>
