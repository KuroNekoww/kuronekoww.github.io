<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>山本小面包🍞的导航页</title>
    
    <link rel="shortcut icon" href="./ico.ico" type="image/x-icon">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.5);
            --glass-border: rgba(255, 255, 255, 0.3);
            --text-main: #1e293b;
            --accent: #0078d4;
            --download: #ff6b6b;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --glass: rgba(15, 23, 42, 0.65);
                --glass-border: rgba(255, 255, 255, 0.12);
                --text-main: #f1f5f9;
            }
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; font-family: 'PingFang SC', system-ui, sans-serif;
            color: var(--text-main); min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            padding: 40px 20px 60px; overflow-x: hidden;
        }

        /* 👑 背景层：通过 JS 锁定 px 高度，彻底解决键盘弹出时的闪烁和缩放 */
        .fixed-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            z-index: -2;
            background-color: #1a1a1a;
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover;
            opacity: 0;
            transition: opacity 1s ease;
            /* 强制开启硬件加速 */
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
            backface-visibility: hidden;
        }

        .overlay {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: brightness(0.85);
            -webkit-backdrop-filter: brightness(0.85);
        }

        .container { width: 100%; max-width: 900px; z-index: 1; }

        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { 
            font-size: clamp(1.8rem, 5vw, 2.8rem); margin: 0; color: #fff; 
            text-shadow: 0 4px 15px rgba(0,0,0,0.5); 
        }

        /* 👑 统一的毛玻璃样式 */
        .glass-style {
            background: var(--glass);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0,0,0,0.18);
        }

        #hitokoto { 
            display: inline-block; margin-top: 18px; padding: 12px 24px;
            border-radius: 30px; font-size: 0.95rem; cursor: pointer;
            transition: transform 0.2s;
        }
        #hitokoto:hover { transform: scale(1.05); box-shadow: 0 8px 25px rgba(0,0,0,0.2); }
        #hitokoto:active { transform: scale(0.95); }

        .search-area { margin: 40px 0 55px; display: flex; justify-content: center; }
        .search-box {
            display: flex; align-items: center; width: 100%; max-width: 580px; 
            border-radius: 50px; padding: 6px 22px;
            transition: border-color 0.3s;
        }
        .search-box:focus-within { border-color: var(--accent); }
        .search-box input { 
            flex: 1; border: none; background: transparent; 
            color: var(--text-main); font-size: 16px; 
            padding: 10px 0; outline: none; 
        }

        .category { margin-bottom: 45px; opacity: 0; animation: fadeInUp 0.8s ease forwards; }
        .category-title {
            display: flex; align-items: center; font-size: 1.25rem; font-weight: bold; 
            margin-bottom: 20px; color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,0.4);
            padding-left: 14px; border-left: 4px solid var(--accent);
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
        
        .card {
            background: var(--glass); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 20px; padding: 20px; 
            display: flex; align-items: center; gap: 16px; 
            border: 1px solid var(--glass-border);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
        }
        }
        
        
        @media (hover: hover) {
            .card:hover { transform: scale(0.98); }
        }
        .card:active { transform: scale(0.96); }

        .icon { font-size: 2.2rem; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; }

        .footer-download {
            text-align: center; margin-top: auto; padding: 15px 35px;
            border-radius: 40px; font-size: 0.9rem;
        }
        .footer-download a { color: var(--download); text-decoration: none; font-weight: 800; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="fixed-bg" id="bg-layer"></div>
<div class="overlay"></div>

<div class="container">
    <div class="header">
        <h1>山本小面包🍞的导航页</h1>
        <div id="hitokoto" class="glass-style">连接中...</div>
    </div>

    <div class="search-area">
        <form class="search-box glass-style" action="https://www.bing.com/search" method="get" target="_blank">
            <img src="https://picui.ogmua.cn/s1/2026/03/30/69c94d3fbf8c8.webp" alt="B" style="width:24px; margin-right:12px;">
            <input type="text" name="q" placeholder="在 Bing 中搜索..." autocomplete="off">
        </form>
    </div>

    <div id="nav-container"></div>

    <div class="footer-download glass-style">
        喜欢背景图吗? <a id="download-link" href="#" target="_blank">点击下载</a>
    </div>
</div>

<script>
    const isMobile = /Android|webOS|iPhone|iPad|iPod/i.test(navigator.userAgent);

    async function initPage() {
        // 1. 锁定背景高度，防止键盘弹出导致背景闪烁
        const bgLayer = document.getElementById('bg-layer');
        bgLayer.style.height = window.innerHeight + 'px';

        const bgUrl = isMobile ? 'https://api.yppp.net/pe.php' : 'https://api.yppp.net/pc.php';
        try {
            const res = await fetch(bgUrl);
            const blob = await res.blob();
            const objectUrl = URL.createObjectURL(blob);
            
            const img = new Image();
            img.src = objectUrl;
            img.onload = () => {
                bgLayer.style.backgroundImage = `url('${objectUrl}')`;
                bgLayer.style.opacity = '1';
                document.getElementById('download-link').href = objectUrl;
            };
        } catch (e) { console.error("BG Error"); }
    }

    async function getHitokoto() {
        const hElem = document.getElementById('hitokoto');
        try {
            const res = await fetch('https://v1.hitokoto.cn?c=a&c=b&max_length=24');
            const data = await res.json();
            hElem.innerText = `${data.hitokoto} —— 「${data.from}」`;
        } catch (e) { hElem.innerText = "跨越星辰，只为与你相遇。"; }
    }

    async function loadNav() {
        const container = document.getElementById('nav-container');
        try {
            const response = await fetch('./config.yml');
            const yamlText = await response.text();
            const config = jsyaml.load(yamlText);
            
            container.innerHTML = config.categories.map((cat, idx) => `
                <div class="category" style="animation-delay: ${idx * 0.1}s">
                    <div class="category-title">${cat.name}</div>
                    <div class="grid">${cat.links.map(link => `
                        <a href="${link.url}" class="card glass-style" target="_blank">
                            <div class="icon">${link.icon || '🔗'}</div>
                            <div class="info">
                                <h3 style="margin:0; font-size:1.05rem;">${link.name}</h3>
                                <p style="margin:5px 0 0; font-size:0.85rem; opacity:0.8;">${link.desc || ''}</p>
                            </div>
                        </a>
                    `).join('')}</div>
                </div>
            `).join('');
        } catch (e) { container.innerHTML = '<p style="color:#fff;text-align:center;">配置加载失败</p>'; }
    }

    // 监听窗口尺寸变化，仅在非输入状态下更新背景高度
    window.addEventListener('resize', () => {
        if (document.activeElement.tagName !== 'INPUT') {
            document.getElementById('bg-layer').style.height = window.innerHeight + 'px';
        }
    });

    window.addEventListener('DOMContentLoaded', () => {
        initPage();
        getHitokoto();
        loadNav();
        document.getElementById('hitokoto').onclick = getHitokoto;
    });
</script>

</body>
</html>
