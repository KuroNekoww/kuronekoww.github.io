<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>山本小面包🍞的导航页</title>
    <link rel="icon" href="ico.ico">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>

    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
            --overlay-color: rgba(0, 0, 0, 0.25);
            --accent-blue: #3b82f6; 
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --glass-bg: rgba(0, 0, 0, 0.45);
                --glass-border: rgba(255, 255, 255, 0.08);
                --overlay-color: rgba(0, 0, 0, 0.4);
            }
        }

        /* 1. 基础重置 & 溢出控制 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; /* 禁止外层滚动 */
            background-color: #000;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-color);
        }

        /* 2. 背景层：强制充满并锁定 */
        #bg-layer {
            position: fixed;
            top: 0; left: 0; 
            width: 100%;
            height: 100%; 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -2;
            opacity: 0; /* 初始透明 */
            transition: opacity 0.8s ease;
            transform: translate3d(0,0,0);
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; 
            width: 100%; height: 100%;
            background: var(--overlay-color);
            z-index: -1;
            pointer-events: none;
        }

        /* 3. 滚动接管：隐藏滚动条 */
        .scroll-wrapper {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden; /* 严禁横滑动 */
            -webkit-overflow-scrolling: touch;
            z-index: 1;
            /* 隐藏滚动条 - Firefox */
            scrollbar-width: none;
            /* 隐藏滚动条 - IE */
            -ms-overflow-style: none;
        }
        /* 隐藏滚动条 - Chrome/Safari */
        .scroll-wrapper::-webkit-scrollbar {
            display: none;
            width: 0;
            height: 0;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 18px;
            display: flex;
            flex-direction: column;
            min-height: 101%; /* 略微超过100%确保弹性滚动感 */
        }

        header { text-align: center; margin-bottom: 35px; }
        .main-title { font-size: 2.2rem; font-weight: bold; text-shadow: 0 4px 15px rgba(0,0,0,0.3); margin-bottom: 12px; }

        .hitokoto-capsule {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 50px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            cursor: pointer;
            max-width: 100%;
        }
        #hitokoto-text { font-size: 0.88rem; opacity: 0.9; line-height: 1.5; }

        /* 4. 搜索框：修复宽度溢出 */
        .search-wrapper {
            display: flex;
            align-items: center;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 50px;
            padding: 12px 20px;
            width: 100%; 
            max-width: 550px;
            margin: 0 auto 40px auto;
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        .search-wrapper:focus-within {
            border-color: var(--accent-blue);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
        }
        .search-wrapper img { width: 18px; height: 18px; margin-right: 12px; flex-shrink: 0; }
        .search-wrapper input { 
            flex: 1; background: transparent; border: none; color: white; 
            outline: none; font-size: 1rem; width: 100%;
        }

        .category-title { font-size: 1.15rem; border-left: 4px solid var(--accent-blue); padding-left: 12px; margin: 25px 0 15px 0; }
        .nav-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
        
        .nav-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 18px;
            text-decoration: none;
            color: white;
            opacity: 0;
            transform: translateY(15px);
            transition: transform 0.4s ease, background 0.3s;
        }
        .nav-card.show { animation: fadeUp 0.5s forwards; }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
        .card-title { font-size: 1rem; font-weight: 600; margin-bottom: 4px; }
        .card-desc { font-size: 0.8rem; color: rgba(255, 255, 255, 0.6); line-height: 1.4; }

        footer { margin-top: auto; padding: 40px 0 20px 0; text-align: center; }
        .footer-glass {
            display: inline-block;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 12px 24px;
            border-radius: 18px;
            font-size: 0.82rem;
        }
        .highlight-blue { color: var(--accent-blue) !important; font-weight: bold; text-decoration: none; cursor: pointer; }

        @media (max-width: 768px) {
            .nav-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
            .main-title { font-size: 1.7rem; }
            .container { padding: 25px 12px; }
        }
    </style>
</head>
<body>

    <div id="bg-layer"></div>
    <div class="overlay"></div>

    <div class="scroll-wrapper">
        <div class="container">
            <header>
                <h1 class="main-title">山本小面包</h1>
                <div class="hitokoto-capsule" id="hitokoto-btn">
                    <span id="hitokoto-text">正在捕捉诗句...</span>
                </div>
            </header>

            <main>
                <div class="search-wrapper">
                    <img src="https://picui.ogmua.cn/s1/2026/03/30/69c94d3fbf8c8.webp" alt="Bing">
                    <input type="text" id="search-input" placeholder="在 Bing 上搜索" autocomplete="off">
                </div>
                <div id="nav-container"></div>
            </main>

            <footer>
                <div class="footer-glass">
                    <div style="margin-bottom: 5px; opacity: 0.8;">喜欢背景图吗？<a id="download-bg" class="highlight-blue" target="_blank">点击下载</a></div>
                    <div style="opacity: 0.8;">不喜欢背景图？<span id="refresh-bg" class="highlight-blue">换一个</span></div>
                </div>
            </footer>
        </div>
    </div>

    <script>
        // 1. 物理高度锁定
        const fixBgHeight = () => {
            const bg = document.getElementById('bg-layer');
            const h = window.screen.height || window.innerHeight;
            bg.style.height = (h + 100) + 'px'; 
        };
        fixBgHeight();
        window.addEventListener('orientationchange', () => setTimeout(fixBgHeight, 200));

        // 2. 一言获取
        const fetchHitokoto = async () => {
            const el = document.getElementById('hitokoto-text');
            try {
                const res = await fetch('https://v1.hitokoto.cn?max_length=30');
                const d = await res.json();
                el.innerText = `${d.hitokoto} —— 「${d.from}」`;
            } catch (e) { el.innerText = "纵使疾风起，人生不言弃。"; }
        };
        fetchHitokoto();
        document.getElementById('hitokoto-btn').onclick = fetchHitokoto;

        // 3. 搜索逻辑
        document.getElementById('search-input').onkeypress = (e) => {
            if (e.key === 'Enter' && e.target.value.trim()) {
                window.open(`https://www.bing.com/search?q=${encodeURIComponent(e.target.value)}`, '_blank');
            }
        };

        // 4. 背景加载逻辑 - 强化版（绕过 onload 坑点）
        const loadBg = async () => {
            const bg = document.getElementById('bg-layer');
            const isMobile = window.innerWidth <= 768;
            const api = isMobile ? 'https://api.yppp.net/pe.php' : 'https://api.yppp.net/pc.php';
            const cacheBust = api + '?t=' + Date.now();

            try {
                const res = await fetch(cacheBust);
                const finalUrl = res.url;
                
                // 直接设置背景，不再死等 onload
                bg.style.backgroundImage = `url('${finalUrl}')`;
                bg.style.opacity = 1;
                document.getElementById('download-bg').href = finalUrl;
            } catch (e) {
                // Fetch 被拦截也没关系，直接让 CSS 处理
                bg.style.backgroundImage = `url('${cacheBust}')`;
                bg.style.opacity = 1;
                document.getElementById('download-bg').href = cacheBust;
            }
        };
        loadBg();
        document.getElementById('refresh-bg').onclick = () => {
            document.getElementById('bg-layer').style.opacity = 0;
            setTimeout(loadBg, 500);
        };

        // 5. 导航渲染
        const renderNav = async () => {
            const container = document.getElementById('nav-container');
            try {
                const res = await fetch('./config.yml');
                const yamlText = await res.text();
                const config = jsyaml.load(yamlText);
                let delay = 0;
                config.categories.forEach(cat => {
                    const h2 = document.createElement('h2'); h2.className = 'category-title'; h2.innerText = cat.name;
                    container.appendChild(h2);
                    const grid = document.createElement('div'); grid.className = 'nav-grid';
                    cat.links.forEach(l => {
                        const a = document.createElement('a'); a.className = 'nav-card'; a.href = l.url; a.target = '_blank';
                        a.innerHTML = `<div class="card-title">${l.title}</div><div class="card-desc">${l.desc}</div>`;
                        a.style.animationDelay = `${delay * 0.05}s`;
                        delay++;
                        grid.appendChild(a);
                        requestAnimationFrame(() => a.classList.add('show'));
                    });
                    container.appendChild(grid);
                });
            } catch (e) {}
        };
        renderNav();
    </script>
</body>
</html>
