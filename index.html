<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>山本小面包🍞的导航页</title>
    <link rel="icon" href="ico.ico">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>

    <style>
        :root {
            --liquid-bg: rgba(255, 255, 255, 0.1);
            --liquid-blur: blur(25px) saturate(200%);
            --liquid-border: rgba(255, 255, 255, 0.18); /* 稍微加深边框以替代阴影 */
            --text-color: #ffffff;
            --accent-blue: #4ea1ff;
            --overlay-color: rgba(0, 0, 0, 0.25);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --liquid-bg: rgba(255, 255, 255, 0.06);
                --liquid-border: rgba(255, 255, 255, 0.12);
                --overlay-color: rgba(0, 0, 0, 0.5);
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
            color: var(--text-color);
            background-color: #000;
            width: 100vw;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 背景层：物理锁定防止缩放 */
        #bg-layer {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 120vh;
            background-size: cover; background-position: center; background-repeat: no-repeat;
            opacity: 0; transition: opacity 0.8s ease-in-out;
            z-index: -2; transform: translate3d(0,0,0);
            will-change: opacity;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--overlay-color); z-index: -1; pointer-events: none;
        }

        .container {
            max-width: 1100px; margin: 0 auto; padding: 40px 20px;
            min-height: 100vh; position: relative; z-index: 1;
        }

        header { text-align: center; margin-bottom: 40px; }
        .main-title { font-size: 2.5rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 18px; }

        /* 搜索框：彻底去除阴影 */
        .search-wrapper {
            display: flex; align-items: center;
            background: var(--liquid-bg); backdrop-filter: var(--liquid-blur); -webkit-backdrop-filter: var(--liquid-blur);
            border-radius: 50px; padding: 16px 30px; width: 100%; max-width: 680px; margin: 0 auto 50px auto;
            border: 1px solid var(--liquid-border);
            box-shadow: none; /* 强制无阴影 */
            transition: transform 0.4s cubic-bezier(0.2, 0, 0.2, 1), background-color 0.4s, border-color 0.4s; 
        }
        .search-wrapper:focus-within {
            transform: scale(1.10);
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--accent-blue);
            box-shadow: none;
        }
        .search-wrapper img { width: 22px; height: 22px; margin-right: 14px; }
        .search-wrapper input { flex: 1; background: transparent; border: none; color: #fff; outline: none; font-size: 1.15rem; font-weight: 500; }

        /* 全局扁平化组件 */
        .hitokoto-capsule, .nav-card, .footer-glass {
            background: var(--liquid-bg); backdrop-filter: var(--liquid-blur); -webkit-backdrop-filter: var(--liquid-blur);
            border: 1px solid var(--liquid-border); box-shadow: none;
        }

        .hitokoto-capsule {
            display: inline-block; padding: 10px 24px; border-radius: 40px;
            cursor: pointer; max-width: 95%; transition: transform 0.2s, background 0.3s;
        }
        .hitokoto-capsule:active { transform: scale(0.90); background: rgba(255,255,255,0.15); }
        #hitokoto-text { font-size: 0.92rem; font-weight: 500; }

        .category-title {
            font-size: 1.1rem; color: #ffffff; margin: 35px 0 20px 0;
            font-weight: 700; border-left: 4px solid var(--accent-blue);
            padding-left: 14px; border-radius: 2px;
        }
        .nav-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .nav-card {
            border-radius: 24px; padding: 24px; text-decoration: none;
            color: white; opacity: 0; transform: translateY(20px);
            transition: background 0.3s, transform 0.3s;
        }
        .nav-card.show { animation: reveal 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        @keyframes reveal { to { opacity: 1; transform: translateY(0); } }
        .card-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }
        .card-desc { font-size: 0.88rem; color: rgba(255, 255, 255, 0.55); line-height: 1.5; }

        /* 移动端适配 */
        body.mobile-mode .main-title { font-size: 1.4rem; }
        body.mobile-mode .nav-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
        body.mobile-mode .nav-card { padding: 18px; border-radius: 18px; }
        body.mobile-mode .card-desc { -webkit-line-clamp: 2; display: -webkit-box; -webkit-box-orient: vertical; overflow: hidden; }

        footer { margin: 60px 0 30px 0; text-align: center; }
        .footer-glass { display: inline-flex; gap: 20px; padding: 14px 35px; border-radius: 50px; }
        .footer-link { color: #fff; text-decoration: none; font-size: 0.85rem; font-weight: 600; opacity: 0.7; transition: 0.3s; }
        .footer-link:hover { opacity: 1; color: var(--accent-blue); }
    </style>
</head>
<body id="main-body">
    <div id="bg-layer"></div>
    <div class="overlay"></div>
    <div class="container">
        <header>
            <h1 class="main-title">山本小面包🍞的导航页</h1>
            <div class="hitokoto-capsule" id="hitokoto-btn"><span id="hitokoto-text">正在捕捉...</span></div>
        </header>
        <main>
            <div class="search-wrapper">
                <img src="https://picui.ogmua.cn/s1/2026/03/30/69c94d3fbf8c8.webp" alt="Bing">
                <input type="text" id="search-input" placeholder="在 Bing 上搜索" autocomplete="off">
            </div>
            <div id="nav-container"></div>
        </main>
        <footer>
            <div class="footer-glass">
                <a id="download-bg" class="footer-link" href="#" target="_blank">📥 下载壁纸</a>
                <span id="refresh-bg" class="footer-link" style="cursor:pointer">🔄 切换背景</span>
            </div>
        </footer>
    </div>

    <script>
        // 核心逻辑：精简高效
        const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        if (isMobile) document.getElementById('main-body').classList.add('mobile-mode');

        const fixBg = () => {
            document.getElementById('bg-layer').style.height = ((window.screen.height || window.innerHeight) + 100) + 'px';
        };
        fixBg();
        window.addEventListener('orientationchange', () => setTimeout(fixBg, 200));

        const loadBg = async () => {
            const api = isMobile ? 'https://api.yppp.net/pe.php' : 'https://api.yppp.net/pc.php';
            const bg = document.getElementById('bg-layer');
            try {
                const res = await fetch(api);
                const realUrl = res.url;
                const img = new Image();
                img.src = realUrl;
                img.onload = () => {
                    bg.style.backgroundImage = `url('${realUrl}')`;
                    bg.style.opacity = 1;
                    document.getElementById('download-bg').href = realUrl;
                };
            } catch (e) { bg.style.backgroundImage = `url('${api}')`; bg.style.opacity = 1; }
        };
        loadBg();
        document.getElementById('refresh-bg').onclick = () => {
            document.getElementById('bg-layer').style.opacity = 0;
            setTimeout(loadBg, 400);
        };

        const fetchHitokoto = async () => {
            const el = document.getElementById('hitokoto-text');
            try {
                const res = await fetch('https://v1.hitokoto.cn?c=a&max_length=25');
                const data = await res.json();
                el.innerText = `${data.hitokoto} —— 「${data.from}」`;
            } catch (e) { el.innerText = "纵使疾风起，人生不言弃。"; }
        };
        fetchHitokoto();
        document.getElementById('hitokoto-btn').onclick = fetchHitokoto;

        document.getElementById('search-input').onkeypress = (e) => {
            if (e.key === 'Enter' && e.target.value.trim()) {
                window.open(`https://www.bing.com/search?q=${encodeURIComponent(e.target.value)}`, '_blank');
            }
        };

        const renderNav = async () => {
            const container = document.getElementById('nav-container');
            try {
                const res = await fetch('./config.yml');
                const yamlText = await res.text();
                const config = jsyaml.load(yamlText);
                let delay = 0;
                config.categories.forEach(cat => {
                    const h2 = document.createElement('h2');
                    h2.className = 'category-title';
                    h2.innerText = cat.name;
                    container.appendChild(h2);
                    const grid = document.createElement('div');
                    grid.className = 'nav-grid';
                    cat.links.forEach(link => {
                        const a = document.createElement('a');
                        a.className = 'nav-card';
                        a.href = link.url; a.target = '_blank';
                        a.innerHTML = `<div class="card-title">${link.title}</div><div class="card-desc">${link.desc}</div>`;
                        a.style.animationDelay = `${delay * 0.05}s`;
                        delay++;
                        grid.appendChild(a);
                        requestAnimationFrame(() => a.classList.add('show'));
                    });
                    container.appendChild(grid);
                });
            } catch (e) { console.error("Config error"); }
        };
        renderNav();
    </script>
</body>
</html>
