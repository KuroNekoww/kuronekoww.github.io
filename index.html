<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>山本小面包🍞的导航页</title>
    <link rel="icon" href="ico.ico">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>

    <style>
        /* ================= 基础变量与深色模式适配 ================= */
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
            --coral-red: #ff7f50;
            --overlay-color: rgba(0, 0, 0, 0.25);
            --accent-blue: #3b82f6; /* 搜索框高亮蓝色 */
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --glass-bg: rgba(0, 0, 0, 0.45);
                --glass-border: rgba(255, 255, 255, 0.08);
                --overlay-color: rgba(0, 0, 0, 0.4);
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent; /* 移除移动端点击高亮 */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-color);
            overflow-x: hidden;
            min-height: 100vh;
            background-color: #1a1a1a;
        }

        /* ================= 背景层 (锁定高度+硬件加速) ================= */
        #bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%; 
            background-size: cover;
            background-position: center;
            opacity: 0; 
            transition: opacity 1s ease-in-out;
            z-index: -2;
            /* 强制 GPU 加速 */
            transform: translate3d(0,0,0);
            backface-visibility: hidden;
            will-change: opacity;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--overlay-color);
            z-index: -1;
            transition: background 0.3s ease;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ================= 顶部页眉 (Header) ================= */
        header {
            text-align: center;
            margin-bottom: 40px;
        }

        .main-title {
            font-size: 2.8rem;
            font-weight: bold;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        .hitokoto-capsule {
            display: inline-block;
            padding: 10px 25px;
            border-radius: 50px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.2), 0 4px 10px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            max-width: 90%; /* 防止文字过长超出屏幕 */
        }

        .hitokoto-capsule:active { transform: scale(0.96); }

        #hitokoto-text { 
            font-size: 0.95rem; 
            letter-spacing: 0.5px; 
            opacity: 0.9;
            line-height: 1.4;
        }

        /* ================= 搜索区 (边框高亮优化) ================= */
        .search-wrapper {
            display: flex;
            align-items: center;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 50px;
            padding: 12px 25px;
            width: 60%;
            margin: 0 auto 50px auto;
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: border-color 0.3s ease, box-shadow 0.3s ease, width 0.3s ease;
        }

        .search-wrapper img { width: 22px; height: 22px; margin-right: 15px; }

        .search-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            outline: none;
            font-size: 1.1rem;
            padding: 5px 0;
        }

        .search-wrapper input::placeholder { color: rgba(255, 255, 255, 0.6); }

        /* 激活搜索框时：边框变蓝并产生微光 */
        .search-wrapper:focus-within {
            border-color: var(--accent-blue);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3), 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        /* ================= 主体内容区 (Nav-Grid) ================= */
        .category-title {
            font-size: 1.3rem;
            border-left: 4px solid var(--accent-blue); 
            padding-left: 12px;
            margin: 40px 0 20px 0;
            opacity: 0.9;
        }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        .nav-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 22px;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            opacity: 0;
            transform: translateY(20px);
            /* 更加灵动的贝塞尔曲线 */
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), background 0.3s;
            will-change: transform, opacity;
        }

        .nav-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.18);
        }

        .nav-card.show { animation: fadeUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

        .card-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 6px; }
        .card-desc { font-size: 0.85rem; color: rgba(255, 255, 255, 0.65); line-height: 1.4; }

        /* ================= 底部页脚 ================= */
        footer { margin-top: 60px; text-align: center; padding-bottom: 20px; }
        .footer-glass {
            display: inline-block;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 8px 25px;
            border-radius: 30px;
        }
        .footer-glass a { color: var(--coral-red); text-decoration: none; font-size: 0.85rem; font-weight: 500; }

        /* ================= 响应式调整 (Mobile) ================= */
        @media (max-width: 768px) {
            .main-title { font-size: 1.8rem; }
            .search-wrapper { width: 100%; }
            .nav-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
            .nav-card { padding: 15px; }
            .nav-card:active { transform: scale(0.96); }
        }
    </style>
</head>
<body>

    <div id="bg-layer"></div>
    <div class="overlay"></div>

    <div class="container">
        <header>
            <h1 class="main-title">山本小面包🍞的导航页</h1>
            <div class="hitokoto-capsule" id="hitokoto-btn">
                <span id="hitokoto-text">正在捕捉来自远方的诗句...</span>
            </div>
        </header>

        <main>
            <div class="search-wrapper">
                <img src="https://picui.ogmua.cn/s1/2026/03/30/69c94d3fbf8c8.webp" alt="Bing">
                <input type="text" id="search-input" placeholder="在 Bing 上搜索" autocomplete="off">
            </div>
            <div id="nav-container"></div>
        </main>

        <footer>
            <div class="footer-glass">
                <a id="download-bg" href="#" target="_blank">喜欢背景图吗？点击下载</a>
            </div>
        </footer>
    </div>

    <script>
        // 1. 锁定背景高度，防止移动端键盘弹出导致的抖动
        const lockBgHeight = () => {
            document.getElementById('bg-layer').style.height = window.innerHeight + 'px';
        };
        lockBgHeight();
        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                // 只有在非输入状态下才重设高度，避开键盘干扰
                if (document.activeElement.tagName !== 'INPUT') lockBgHeight();
            }, 200);
        });

        // 2. 一言 API (更新显示格式)
        const fetchHitokoto = async () => {
            const el = document.getElementById('hitokoto-text');
            try {
                const res = await fetch('https://v1.hitokoto.cn?c=a&c=b&max_length=30');
                const data = await res.json();
                // 修复逻辑：显示内容 —— 「出处」
                el.innerText = `${data.hitokoto} —— 「${data.from}」`;
            } catch (e) { 
                el.innerText = "纵使疾风起，人生不言弃。 —— 「起风了」"; 
            }
        };
        fetchHitokoto();
        document.getElementById('hitokoto-btn').onclick = fetchHitokoto;

        // 3. 搜索逻辑
        document.getElementById('search-input').onkeypress = (e) => {
            if (e.key === 'Enter' && e.target.value.trim()) {
                window.open(`https://www.bing.com/search?q=${encodeURIComponent(e.target.value)}`, '_blank');
            }
        };

        // 4. 动态背景 (确保下载一致性)
        const loadBackground = async () => {
            const isMobile = window.innerWidth <= 768;
            const api = isMobile ? 'https://api.yppp.net/pe.php' : 'https://api.yppp.net/pc.php';
            try {
                const res = await fetch(api);
                const realUrl = res.url; // 捕获 302 重定向后的物理地址
                const img = new Image();
                img.src = realUrl;
                img.onload = () => {
                    const bg = document.getElementById('bg-layer');
                    bg.style.backgroundImage = `url('${realUrl}')`;
                    bg.style.opacity = 1;
                    document.getElementById('download-bg').href = realUrl;
                };
            } catch (e) {
                document.getElementById('bg-layer').style.backgroundImage = `url('${api}')`;
                document.getElementById('bg-layer').style.opacity = 1;
                document.getElementById('download-bg').href = api;
            }
        };
        loadBackground();

        // 5. 渲染导航内容
        const renderNav = async () => {
            const container = document.getElementById('nav-container');
            try {
                const res = await fetch('./config.yml');
                const yamlText = await res.text();
                const config = jsyaml.load(yamlText);
                
                let delay = 0;
                config.categories.forEach(cat => {
                    const h2 = document.createElement('h2');
                    h2.className = 'category-title';
                    h2.innerText = cat.name;
                    container.appendChild(h2);

                    const grid = document.createElement('div');
                    grid.className = 'nav-grid';
                    
                    cat.links.forEach(link => {
                        const a = document.createElement('a');
                        a.className = 'nav-card';
                        a.href = link.url;
                        a.target = '_blank';
                        a.innerHTML = `<div class="card-title">${link.title}</div><div class="card-desc">${link.desc}</div>`;
                        a.style.animationDelay = `${delay * 0.05}s`;
                        delay++;
                        grid.appendChild(a);
                        requestAnimationFrame(() => a.classList.add('show'));
                    });
                    container.appendChild(grid);
                });
            } catch (e) {
                container.innerHTML = '<p style="text-align:center;padding:20px;">配置读取失败，请检查 config.yml 文件。</p>';
            }
        };
        renderNav();
    </script>
</body>
</html>
